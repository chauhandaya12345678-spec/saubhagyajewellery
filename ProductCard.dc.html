<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<style>
.cc-quickadd{position:absolute;left:10px;right:10px;bottom:10px;height:38px;display:flex;align-items:center;justify-content:center;background:rgba(11,60,38,.94);color:#fff;font-family:'Montserrat',sans-serif;font-size:10.5px;letter-spacing:2px;cursor:pointer;border-radius:6px;opacity:0;transform:translateY(8px);transition:opacity .3s ease, transform .3s ease;border:none}
.cc-card-img:hover .cc-quickadd{opacity:1;transform:translateY(0)}
.cc-heart{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);transition:transform .25s ease}
.cc-heart:hover{transform:scale(1.08)}
@media(max-width:900px){
  .cc-card-img{height:auto!important;aspect-ratio:1/1!important;border-radius:10px!important}
  .cc-name{font-size:15px!important;line-height:1.25!important}
  .cc-price{font-size:12px!important}
  .cc-pad{padding:12px 4px 0!important}
  .cc-quickadd{opacity:1;transform:translateY(0);height:34px;font-size:10px;letter-spacing:1.5px}
}
@media(max-width:640px){
  .cc-card-img{aspect-ratio:1/1!important;height:auto!important;border-radius:10px!important}
  .cc-name{font-size:13.5px!important;line-height:1.25!important}
  .cc-price{font-size:12px!important}
  .cc-pad{padding:10px 2px 0!important}
  .cc-gap{gap:6px!important}
  .cc-heart{width:28px;height:28px;top:8px;right:8px}
  .cc-quickadd{left:6px;right:6px;bottom:6px;height:32px;font-size:9.5px;letter-spacing:1px}
}
</style>
</head>
<body>
<x-dc>
<div onMouseEnter="{{ onEnter }}" onMouseLeave="{{ onLeave }}" onClick="{{ onClick }}" style="cursor:pointer; font-family:'Montserrat',sans-serif;">
  <div style="position:relative; height:340px; overflow:hidden; background:#efece4; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);" class="cc-card-img">
    <div style="position:absolute; inset:0; background:{{ frontBg }}; display:flex; align-items:center; justify-content:center; transition:opacity .7s ease, transform 1.1s cubic-bezier(.22,1,.36,1); opacity:{{ frontOpacity }}; transform:scale({{ scale }}); border-radius:12px;">
      <sc-if value="{{ noImage }}" hint-placeholder-val="{{ true }}">
        <span style="font-family:'Montserrat',monospace; font-size:9px; letter-spacing:2px; color:#b3ab98;">STUDIO PRODUCT SHOT</span>
      </sc-if>
    </div>
    <div style="position:absolute; inset:0; background:{{ altBg }}; display:flex; align-items:center; justify-content:center; transition:opacity .7s ease, transform 1.1s cubic-bezier(.22,1,.36,1); opacity:{{ altOpacity }}; transform:scale({{ scale }}); border-radius:12px;">
      <sc-if value="{{ noImage }}" hint-placeholder-val="{{ true }}">
        <span style="font-family:'Montserrat',monospace; font-size:9px; letter-spacing:2px; color:#a89e86;">ON-MODEL VIEW</span>
      </sc-if>
    </div>
    <sc-if value="{{ hasTag }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute; top:14px; left:14px; background:rgba(255,255,255,.92); backdrop-filter:blur(4px); padding:5px 10px; font-family:'Montserrat',sans-serif; font-size:9px; letter-spacing:1.2px; color:#0B3C26;">{{ tag }}</div>
    </sc-if>
    <div onClick="{{ onHeart }}" class="cc-heart" aria-label="Toggle wishlist">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="{{ heartFill }}" stroke="{{ heartStroke }}" stroke-width="1.6"><path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0112 5.5 5.5 5.5 0 0121.5 12C19 16.5 12 21 12 21z"/></svg>
    </div>
    <button onClick="{{ onQuickAdd }}" class="cc-quickadd">{{ addLabel }}</button>
  </div>
  <div style="padding:18px 2px 0;" class="cc-pad">
    <div style="font-family:'Cormorant Garamond',serif; font-size:19px; color:#1A1A1A; line-height:1.3;" class="cc-name">{{ name }}</div>
    <div style="display:flex; align-items:baseline; gap:8px; margin-top:7px;">
      <span style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:500; color:#0B3C26;" class="cc-price">{{ priceText }}</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:440},&quot;product&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;},&quot;onOpen&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(id:string)=&gt;void&quot;},&quot;onAddToCart&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(id:string)=&gt;void&quot;},&quot;onWishlistToggle&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(id:string)=&gt;void&quot;},&quot;inWishlist&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  state = { hover: false, added: false };
  fmt(n) { return '₹' + Number(n || 0).toLocaleString('en-IN'); }
  renderVals() {
    const p = this.props.product || {};
    const h = this.state.hover;
    const tag = p.badge || '';
    const inWish = !!this.props.inWishlist;
    const stripeF = 'repeating-linear-gradient(135deg,#f1efe9 0 16px,#e9e6dd 16px 32px)';
    return {
      name: p.name || '', tag, hasTag: !!tag,
      priceText: this.fmt(p.price),
      noImage: !p.image,
      frontBg: p.image ? "#efece4 url('" + p.image + "') center/cover no-repeat" : stripeF,
      altBg: 'transparent',
      scale: h ? 1.04 : 1, frontOpacity: 1, altOpacity: 0,
      heartFill: inWish ? '#9e2a2b' : 'none',
      heartStroke: inWish ? '#9e2a2b' : '#0B3C26',
      addLabel: this.state.added ? 'ADDED ✓' : 'QUICK ADD',
      onEnter: () => this.setState({ hover: true }),
      onLeave: () => this.setState({ hover: false }),
      onClick: () => this.props.onOpen && this.props.onOpen(p.id),
      onHeart: (e) => {
        if (e && e.stopPropagation) e.stopPropagation();
        if (this.props.onWishlistToggle) this.props.onWishlistToggle(p.id);
      },
      onQuickAdd: (e) => {
        if (e && e.stopPropagation) e.stopPropagation();
        if (this.props.onAddToCart) this.props.onAddToCart(p.id);
        this.setState({ added: true });
        setTimeout(() => this.setState({ added: false }), 1400);
      }
    };
  }
}
</script>
</body>
</html>
