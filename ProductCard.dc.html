<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div onMouseEnter="{{ onEnter }}" onMouseLeave="{{ onLeave }}" onClick="{{ onClick }}" style="cursor:pointer; font-family:'Montserrat',sans-serif;">
  <div style="position:relative; height:340px; overflow:hidden; background:#efece4;">
    <div style="position:absolute; inset:0; background:{{ frontBg }}; display:flex; align-items:center; justify-content:center; transition:opacity .7s ease, transform 1.1s cubic-bezier(.22,1,.36,1); opacity:{{ frontOpacity }}; transform:scale({{ scale }});">
      <sc-if value="{{ noImage }}" hint-placeholder-val="{{ true }}">
        <span style="font-family:'Montserrat',monospace; font-size:9px; letter-spacing:2px; color:#b3ab98;">STUDIO PRODUCT SHOT</span>
      </sc-if>
    </div>
    <div style="position:absolute; inset:0; background:{{ altBg }}; display:flex; align-items:center; justify-content:center; transition:opacity .7s ease, transform 1.1s cubic-bezier(.22,1,.36,1); opacity:{{ altOpacity }}; transform:scale({{ scale }});">
      <sc-if value="{{ noImage }}" hint-placeholder-val="{{ true }}">
        <span style="font-family:'Montserrat',monospace; font-size:9px; letter-spacing:2px; color:#a89e86;">ON-MODEL VIEW</span>
      </sc-if>
    </div>
    <div style="position:absolute; top:14px; left:14px; background:rgba(255,255,255,.92); backdrop-filter:blur(4px); padding:5px 10px; font-family:'Montserrat',sans-serif; font-size:9px; letter-spacing:1.2px; color:#0B3C26;">{{ tag }}</div>
  </div>
  <div style="padding:18px 2px 0;">
    <div style="font-family:'Cormorant Garamond',serif; font-size:19px; color:#1A1A1A; line-height:1.3;">{{ name }}</div>
    <div style="display:flex; align-items:baseline; gap:8px; margin-top:7px;">
      <span style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:500; color:#0B3C26;">{{ priceText }}</span>
      <span style="font-family:'Montserrat',sans-serif; font-size:10px; color:#9a9a9a;">incl. GST</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:440},&quot;product&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;},&quot;onOpen&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(id:string)=&gt;void&quot;}}">
class Component extends DCLogic {
  state = { hover: false };
  fmt(n) { return '₹' + Number(n || 0).toLocaleString('en-IN'); }
  renderVals() {
    const p = this.props.product || {};
    const h = this.state.hover;
    const tag = p.badge ? (p.city ? p.badge + ' · ' + p.city : p.badge) : (p.city || '');
    const stripeF = 'repeating-linear-gradient(135deg,#f1efe9 0 16px,#e9e6dd 16px 32px)';
    const stripeA = 'repeating-linear-gradient(135deg,#e7e2d6 0 16px,#ddd6c6 16px 32px)';
    const alt = p.altImage || p.image;
    return {
      name: p.name || '', tag,
      priceText: this.fmt(p.price),
      noImage: !p.image,
      frontBg: p.image ? "#efece4 url('" + p.image + "') center/cover no-repeat" : stripeF,
      altBg: alt ? "#efece4 url('" + alt + "') center/cover no-repeat" : stripeA,
      scale: h ? 1.06 : 1, frontOpacity: h ? 0 : 1, altOpacity: h ? 1 : 0,
      onEnter: () => this.setState({ hover: true }),
      onLeave: () => this.setState({ hover: false }),
      onClick: () => this.props.onOpen && this.props.onOpen(p.id)
    };
  }
}
</script>
</body>
</html>
