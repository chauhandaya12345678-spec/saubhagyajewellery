<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Account | Saubhagya</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css?v=25">
<script src="layout.js?v=14"></script>
<script src="mpa.js?v=13" defer></script>
<script src="catalog.js?v=13"></script>
<style>
  * { box-sizing: border-box; }
  body { background:#F0F5FA; margin:0; }
  .ac-wrap { max-width:900px; margin:0 auto; padding:30px 24px 80px; }
  .ac-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
  .ac-h1 { font-family:'Playfair Display',serif; font-size:32px; color:#1A1A1A; margin:0; }
  .ac-sub { font-family:'Montserrat',sans-serif; font-size:12px; color:#9a9a9a; }
  .ac-signout { font-family:'Montserrat',sans-serif; font-size:13px; letter-spacing:1.5px; color:#c0392b; background:none; border:1px solid #ddd6c6; padding:8px 16px; cursor:pointer; border-radius:14px; box-shadow:0 2px 8px rgba(11,41,28,.08); transition:all .3s; }
  .ac-signout:hover { border-color:#c0392b; transform:translateY(-2px); box-shadow:0 4px 12px rgba(11,41,28,.15); }
  .ac-section { margin-bottom:30px; }
  .ac-section h2 { font-family:'Playfair Display',serif; font-size:22px; color:#0B291C; margin:0 0 14px; }
  .ac-empty { padding:24px; text-align:center; font-family:'Montserrat',sans-serif; font-size:13px; color:#9a9a9a; background:#fff; border:1px solid #eae5d8; border-radius:8px; }
  .ac-empty a { color:#0B291C; }
  .ac-cards { display:flex; flex-direction:column; gap:12px; }
  .ac-fav-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  @media(max-width:640px) { .ac-fav-grid { grid-template-columns:repeat(2,1fr); gap:10px; } }
  .ac-fav-card { display:block; text-decoration:none; color:inherit; border:1px solid #eae5d8; border-radius:8px; overflow:hidden; background:#fff; }
  .ac-fav-img { width:100%; aspect-ratio:4/5; object-fit:cover; background:#f0ede5; display:block; }
  .ac-fav-body { padding:8px 10px 12px; }
  .ac-fav-name { font-family:'Playfair Display',serif; font-size:14px; color:#1A1A1A; line-height:1.3; }
  .ac-fav-price { font-family:'Montserrat',sans-serif; font-size:12px; color:#0B291C; font-weight:500; margin-top:3px; }
  .ac-guest { text-align:center; padding:60px 20px; }
  .ac-guest h2 { font-family:'Playfair Display',serif; font-size:26px; color:#1A1A1A; margin:0 0 10px; }
  .ac-guest p { font-family:'Montserrat',sans-serif; font-size:13px; color:#6a6a6a; margin:0 0 20px; }
  .ac-guest a { display:inline-block; padding:12px 26px; background:#0B291C; color:#fff; font-family:'Montserrat',sans-serif; font-size:13px; letter-spacing:1.5px; text-decoration:none; }
</style>
</head>
<body>
<x-layout page="account.html"></x-layout>
<main>
  <div class="ac-wrap">
    <div id="ac-guest-view" class="ac-guest" style="display:none">
      <h2>Sign in to your account</h2>
      <p>Track orders, save favourites, and check out faster next time.</p>
      <a href="signin.html">SIGN IN</a>
    </div>
    <div id="ac-content" style="display:none">
      <div class="ac-head">
        <div>
          <h1 class="ac-h1" id="ac-hello">My Account</h1>
          <div class="ac-sub" id="ac-contact"></div>
        </div>
        <button class="ac-signout" data-mpa-signout>Sign out</button>
      </div>
      <div class="ac-section">
        <h2>My Profile</h2>
        <div style="background:#fff;border:1px solid #eae5d8;border-radius:8px;padding:20px 22px;">
          <div style="display:grid;grid-template-columns:120px 1fr;gap:10px 16px;font-family:'Montserrat',sans-serif;font-size:13px;color:#4a4a4a;line-height:1.6;">
            <div style="color:#9a9a9a;text-transform:uppercase;font-size:10px;letter-spacing:1.5px;padding-top:2px;">Name</div>
            <div id="pf-name" style="color:#1A1A1A;">—</div>
            <div style="color:#9a9a9a;text-transform:uppercase;font-size:10px;letter-spacing:1.5px;padding-top:2px;">Email</div>
            <div id="pf-email" style="color:#1A1A1A;word-break:break-word;">—</div>
            <div style="color:#9a9a9a;text-transform:uppercase;font-size:10px;letter-spacing:1.5px;padding-top:2px;">Phone</div>
            <div id="pf-phone" style="color:#1A1A1A;">—</div>
            <div style="color:#9a9a9a;text-transform:uppercase;font-size:10px;letter-spacing:1.5px;padding-top:2px;">Member since</div>
            <div id="pf-since" style="color:#1A1A1A;">—</div>
          </div>
          <div style="margin-top:14px;font-family:'Montserrat',sans-serif;font-size:13px;color:#9a9a9a;">
            To change your email or phone, write to <a href="mailto:care@saubhagyajewellery.com" style="color:#0B291C;">care@saubhagyajewellery.com</a>.
          </div>
        </div>
      </div>
      <div class="ac-section">
        <h2>My Orders</h2>
        <div class="ac-cards" id="ac-orders"></div>
      </div>
      <div class="ac-section">
        <h2>Favourites</h2>
        <div id="ac-favs-wrap"></div>
      </div>
    </div>
  </div>
</main>
<x-footer></x-footer>
<script>
(function () {
  'use strict';
  var $ = function(id) { return document.getElementById(id); };
  var fmt = function(p) { return '₹' + Number((p||0)/100).toLocaleString('en-IN'); };
  var esc = function(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); };
  var CATALOG = {};

  function hydrate() { (window.CHAUHAN_CATALOG || []).forEach(function(p) { CATALOG[p.id || p.sku] = p; }); }

  function fmtDate(d) { if (!d) return ''; return new Date(String(d).replace(' ','T')+'Z').toLocaleDateString('en-IN', { month:'short', day:'numeric', year:'numeric' }); }

  function ordersUI(orders) {
    if (!orders.length) { $('ac-orders').innerHTML = '<div class="ac-empty">No orders yet. <a href="index.html">Start shopping →</a></div>'; return; }
    $('ac-orders').innerHTML = orders.map(function(o) {
      var status = (o.status || 'confirmed').toUpperCase();
      var phone = String(o.phone || '').replace(/\D/g, '').slice(-10);
      return '<a href="track-orders.html?order_id=' + encodeURIComponent(o.id) + '&phone=' + phone + '" style="text-decoration:none;color:inherit"><div style="border:1px solid rgba(90,136,0,.25);border-radius:10px;padding:14px 16px;background:#fff">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px">' +
        '<span style="font-family:\'Montserrat\',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;color:#0B291C">' + esc(o.id) + '</span>' +
        '<span style="font-family:\'Montserrat\',sans-serif;font-size:9px;font-weight:500;letter-spacing:1.5px;padding:4px 10px;border-radius:20px;background:#0B291C;color:#fff">' + status + '</span>' +
        '</div>' +
        '<div style="font-family:\'Montserrat\',sans-serif;font-size:12px;color:#6a6a6a;margin-top:6px">' + fmt(o.total) + ' · ' + fmtDate(o.created_at) + '</div>' +
      '</div></a>';
    }).join('');
  }

  function favsUI() {
    var favs = [];
    try { favs = JSON.parse(localStorage.getItem('cc_favs') || '[]'); } catch(e) {}
    if (!favs.length) { $('ac-favs-wrap').innerHTML = '<div class="ac-empty">No favourites yet. Tap the heart on any piece to save it here.</div>'; return; }
    $('ac-favs-wrap').innerHTML = '<div class="ac-fav-grid">' + favs.map(function(sku) {
      var p = CATALOG[sku];
      if (!p) return '';
      return '<a class="ac-fav-card" href="product.html?sku=' + encodeURIComponent(sku) + '">' +
        (p.image ? '<img class="ac-fav-img" src="' + esc(p.image) + '" alt="">' : '<div class="ac-fav-img"></div>') +
        '<div class="ac-fav-body"><div class="ac-fav-name">' + esc(p.name) + '</div>' +
        '<div class="ac-fav-price">₹' + Number(p.price || 0).toLocaleString('en-IN') + '</div></div></a>';
    }).join('') + '</div>';
  }

  function profileUI(user, oldestOrder) {
    $('pf-name').textContent = user.name || '—';
    $('pf-email').textContent = user.email || 'Not on file';
    $('pf-phone').textContent = user.phone ? '+91 ' + user.phone : 'Not on file';
    var since = oldestOrder && oldestOrder.created_at
      ? new Date(String(oldestOrder.created_at).replace(' ','T')+'Z').toLocaleDateString('en-IN', { month:'short', year:'numeric' })
      : 'Recently';
    $('pf-since').textContent = since;
  }

  function loadOrders(user) {
    var url = user.phone ? '/api/orders/track?phone=' + encodeURIComponent(user.phone)
                        : '/api/orders/track?email=' + encodeURIComponent(user.email);
    var opts = {};
    try { var t = localStorage.getItem('cc_token'); if (t) opts.headers = { 'Authorization': 'Bearer ' + t }; } catch(e) {}
    fetch(url, opts).then(function(r) { return r.json(); }).then(function(d) {
      var list = (d && d.success && d.orders) ? d.orders : [];
      if (user.phone && user.email) {
        list = list.filter(function(o) { return String(o.phone||'').replace(/\D/g,'').slice(-10) === String(user.phone).replace(/\D/g,'').slice(-10); });
      }
      var oldest = list.length ? list.slice().sort(function(a,b){ return String(a.created_at||'').localeCompare(String(b.created_at||'')); })[0] : null;
      profileUI(user, oldest);
      ordersUI(list);
    }).catch(function() { profileUI(user, null); ordersUI([]); });
  }

  function boot() {
    hydrate();
    var user = null;
    try { user = window.MPA ? window.MPA.getUser() : null; } catch(e) {}
    if (!user) { $('ac-guest-view').style.display = 'block'; return; }
    $('ac-content').style.display = 'block';
    var first = String(user.name || 'there').split(/\s+/)[0];
    $('ac-hello').textContent = 'Hello, ' + first;
    $('ac-contact').textContent = user.email || ('+91 ' + (user.phone || ''));
    loadOrders(user);
    favsUI();
    if (!(window.CHAUHAN_CATALOG || []).length) {
      window.addEventListener('catalog-ready', function once() { window.removeEventListener('catalog-ready', once); hydrate(); favsUI(); });
    }
  }
  if (document.readyState !== 'loading') boot();
  else document.addEventListener('DOMContentLoaded', boot);
})();
</script>
</body>
</html>
