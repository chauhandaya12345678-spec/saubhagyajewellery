<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventory Admin | Saubhagya</title>
<meta name="robots" content="noindex,nofollow">
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #F0F5FA; font-family: 'Montserrat', sans-serif; font-size: 13px; color: #1A1A1A; }
.ai-header { background: #0B291C; color: #fff; padding: 18px 32px; display: flex; align-items: center; gap: 20px; }
.ai-header h1 { margin: 0; font-size: 18px; font-weight: 500; letter-spacing: 1px; }
.ai-wrap { max-width: 960px; margin: 32px auto; padding: 0 24px 80px; }
.ai-auth { background: #fff; border: 1px solid #eae5d8; border-radius: 12px; padding: 32px; max-width: 400px; margin: 60px auto; }
.ai-auth h2 { margin: 0 0 18px; font-size: 16px; }
.ai-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd6c6; border-radius: 6px; font-family: inherit; font-size: 13px; margin-bottom: 12px; }
.ai-btn { padding: 10px 22px; background: #0B291C; color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: 12px; letter-spacing: 1px; cursor: pointer; }
.ai-btn:hover { background: #071B12; }
.ai-btn:disabled { opacity: .5; cursor: default; }
.ai-status { font-size: 12px; color: #9a9a9a; margin-top: 8px; min-height: 16px; }
.ai-table-wrap { background: #fff; border: 1px solid #eae5d8; border-radius: 12px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { background: #f8f6f1; padding: 12px 14px; text-align: left; font-size: 11px; letter-spacing: 1px; color: #6a6a6a; border-bottom: 1px solid #eae5d8; font-weight: 600; }
td { padding: 10px 14px; border-bottom: 1px solid #f3ede1; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #faf8f3; }
.ai-num { width: 90px; padding: 7px 10px; border: 1px solid #ddd6c6; border-radius: 6px; font-family: inherit; font-size: 13px; }
.ai-save { padding: 7px 14px; background: #0B291C; color: #fff; border: none; border-radius: 8px; font-family: inherit; font-size: 11px; letter-spacing: .8px; cursor: pointer; white-space: nowrap; }
.ai-save:hover { background: #071B12; }
.ai-save.saved { background: #2d7a4f; }
.ai-save.err { background: #c0392b; }
.ai-sku { font-family: monospace; font-size: 12px; color: #9a9a9a; }
.ai-name { font-weight: 500; }
.ai-msg { font-size: 11px; color: #9a9a9a; }
</style>
</head>
<body>
<div class="ai-header">
  <h1>INVENTORY ADMIN</h1>
  <span style="font-size:11px;color:#C5A880;letter-spacing:1px">Saubhagya Jewellery</span>
</div>

<div id="ai-auth-screen">
  <div class="ai-auth">
    <h2>Admin Access</h2>
    <input class="ai-input" type="password" id="ai-key-input" placeholder="Enter Admin Key" autocomplete="off">
    <br>
    <button class="ai-btn" id="ai-key-btn" type="button">ENTER</button>
    <div class="ai-status" id="ai-auth-status"></div>
  </div>
</div>

<div id="ai-main" style="display:none">
  <div class="ai-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div style="font-size:12px;color:#9a9a9a" id="ai-count"></div>
      <button class="ai-btn" id="ai-reload-btn" type="button">REFRESH</button>
    </div>
    <div class="ai-table-wrap">
      <table>
        <thead>
          <tr>
            <th>SKU</th>
            <th>Name</th>
            <th>Stock Count</th>
            <th>Weight (g)</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="ai-tbody"></tbody>
      </table>
    </div>
    <div class="ai-status" id="ai-load-status"></div>
  </div>
</div>

<script>
(function () {
  var adminKey = '';

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }

  document.getElementById('ai-key-btn').addEventListener('click', function () {
    var k = (document.getElementById('ai-key-input').value || '').trim();
    if (!k) { document.getElementById('ai-auth-status').textContent = 'Key required.'; return; }
    adminKey = k;
    document.getElementById('ai-auth-screen').style.display = 'none';
    document.getElementById('ai-main').style.display = 'block';
    loadProducts();
  });
  document.getElementById('ai-key-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('ai-key-btn').click();
  });

  document.getElementById('ai-reload-btn').addEventListener('click', loadProducts);

  function loadProducts() {
    var status = document.getElementById('ai-load-status');
    var tbody = document.getElementById('ai-tbody');
    status.textContent = 'Loading…';
    tbody.innerHTML = '';
    fetch('/api/products')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var list = Array.isArray(data) ? data : (data && data.products || []);
        document.getElementById('ai-count').textContent = list.length + ' products';
        status.textContent = '';
        tbody.innerHTML = list.map(function (p) {
          return '<tr data-sku="' + esc(p.sku) + '">' +
            '<td class="ai-sku">' + esc(p.sku) + '</td>' +
            '<td class="ai-name">' + esc(p.name) + '</td>' +
            '<td><input class="ai-num" type="number" min="0" step="1" value="' + (p.stock_count != null ? p.stock_count : '') + '" data-field="stock_count"></td>' +
            '<td><input class="ai-num" type="number" min="0" step="0.1" value="' + (p.weightGrams != null ? p.weightGrams : '') + '" data-field="weightGrams"></td>' +
            '<td><button class="ai-save" type="button">SAVE</button><div class="ai-msg"></div></td>' +
            '</tr>';
        }).join('');
        tbody.querySelectorAll('.ai-save').forEach(function (btn) {
          btn.addEventListener('click', function () { saveRow(btn.closest('tr')); });
        });
      })
      .catch(function (e) { status.textContent = 'Failed to load: ' + e.message; });
  }

  function saveRow(row) {
    var sku = row.getAttribute('data-sku');
    var scInput = row.querySelector('[data-field="stock_count"]');
    var wgInput = row.querySelector('[data-field="weightGrams"]');
    var btn = row.querySelector('.ai-save');
    var msg = row.querySelector('.ai-msg');
    var body = { sku: sku };
    if (scInput.value !== '') body.stock_count = parseInt(scInput.value, 10);
    if (wgInput.value !== '') body.weightGrams = parseFloat(wgInput.value);
    btn.disabled = true; btn.textContent = '…'; msg.textContent = '';
    fetch('/api/admin/update-inventory', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
      body: JSON.stringify(body),
    })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        btn.disabled = false;
        if (d && d.success) {
          btn.textContent = 'SAVED'; btn.className = 'ai-save saved';
          setTimeout(function () { btn.textContent = 'SAVE'; btn.className = 'ai-save'; }, 2000);
        } else {
          btn.textContent = 'SAVE'; btn.className = 'ai-save err';
          msg.textContent = (d && d.error) || 'Error';
          setTimeout(function () { btn.className = 'ai-save'; }, 2000);
        }
      })
      .catch(function (e) {
        btn.disabled = false; btn.textContent = 'SAVE'; btn.className = 'ai-save err';
        msg.textContent = e.message;
        setTimeout(function () { btn.className = 'ai-save'; }, 2000);
      });
  }
})();
</script>
</body>
</html>
