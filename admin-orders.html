<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orders Admin | Saubhagya</title>
<meta name="robots" content="noindex,nofollow">
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #F0F5FA; font-family: 'Montserrat', sans-serif; font-size: 13px; color: #1A1A1A; }
.ai-header { background: #0B291C; color: #fff; padding: 18px 32px; display: flex; align-items: center; gap: 20px; }
.ai-header h1 { margin: 0; font-size: 18px; font-weight: 500; letter-spacing: 1px; }
.ai-wrap { max-width: 1180px; margin: 32px auto; padding: 0 24px 80px; }
.ai-auth { background: #fff; border: 1px solid #eae5d8; border-radius: 12px; padding: 32px; max-width: 400px; margin: 60px auto; }
.ai-auth h2 { margin: 0 0 18px; font-size: 16px; }
.ai-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd6c6; border-radius: 6px; font-family: inherit; font-size: 13px; margin-bottom: 12px; }
.ai-btn { padding: 10px 22px; background: #0B291C; color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: 12px; letter-spacing: 1px; cursor: pointer; }
.ai-btn:hover { background: #071B12; }
.ai-status { font-size: 12px; color: #9a9a9a; margin-top: 8px; min-height: 16px; }
.ai-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.ai-toolbar select, .ai-toolbar input { padding: 8px 10px; border: 1px solid #ddd6c6; border-radius: 6px; font-family: inherit; font-size: 12px; }
.ai-toolbar input[type="text"] { width: 200px; }
.ai-count { font-size: 12px; color: #9a9a9a; margin-left: auto; }
.ai-table-wrap { background: #fff; border: 1px solid #eae5d8; border-radius: 12px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
th { background: #f8f6f1; padding: 12px 14px; text-align: left; font-size: 11px; letter-spacing: 1px; color: #6a6a6a; border-bottom: 1px solid #eae5d8; font-weight: 600; white-space: nowrap; }
td { padding: 10px 14px; border-bottom: 1px solid #f3ede1; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #faf8f3; }
.ai-oid { font-family: monospace; font-size: 11px; color: #6a6a6a; }
.ai-items { font-size: 12px; }
.ai-items div { margin-bottom: 2px; }
.ai-addr { font-size: 12px; color: #4a4a4a; max-width: 220px; }
.ai-badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 10px; letter-spacing: .6px; font-weight: 600; text-transform: uppercase; }
.b-confirmed { background: #e8f0ea; color: #2d7a4f; }
.b-shipped { background: #eaf1fb; color: #2a5db0; }
.b-out_for_delivery, .b-out-for-delivery { background: #fef3e0; color: #b06a12; }
.b-delivered { background: #e2f6ea; color: #1c7a3d; }
.b-cancelled { background: #fbe7e6; color: #c0392b; }
.ai-test { font-size: 9px; color: #c0392b; font-weight: 700; letter-spacing: .5px; margin-left: 6px; }
</style>
</head>
<body>
<div class="ai-header">
  <h1>ORDERS ADMIN</h1>
  <span style="font-size:11px;color:#C5A880;letter-spacing:1px">Saubhagya Jewellery</span>
</div>

<div id="ai-auth-screen">
  <div class="ai-auth">
    <h2>Admin Access</h2>
    <input class="ai-input" type="password" id="ai-key-input" placeholder="Enter Admin Key" autocomplete="off">
    <br>
    <button class="ai-btn" id="ai-key-btn" type="button">ENTER</button>
    <div class="ai-status" id="ai-auth-status"></div>
  </div>
</div>

<div id="ai-main" style="display:none">
  <div class="ai-wrap">
    <div class="ai-toolbar">
      <select id="ai-filter-status">
        <option value="">All statuses</option>
        <option value="confirmed">Confirmed</option>
        <option value="shipped">Shipped</option>
        <option value="out_for_delivery">Out for delivery</option>
        <option value="delivered">Delivered</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <input type="text" id="ai-filter-q" placeholder="Search order id / phone / name / email">
      <button class="ai-btn" id="ai-reload-btn" type="button">SEARCH</button>
      <button class="ai-btn" id="ai-export-btn" type="button">EXPORT CSV</button>
      <span class="ai-count" id="ai-count"></span>
    </div>
    <div class="ai-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Order</th>
            <th>Date</th>
            <th>Customer</th>
            <th>Items</th>
            <th>Address</th>
            <th>Total</th>
            <th>Status</th>
            <th>AWB</th>
          </tr>
        </thead>
        <tbody id="ai-tbody"></tbody>
      </table>
    </div>
    <div class="ai-status" id="ai-load-status"></div>
  </div>
</div>

<script>
(function () {
  var adminKey = '';
  var lastOrders = [];

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }

  function csvCell(v) {
    var s = String(v == null ? '' : v);
    if (/[",\n]/.test(s)) s = '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  function downloadCsv(filename, rows) {
    var csv = rows.map(function (r) { return r.map(csvCell).join(','); }).join('\r\n');
    var blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  document.getElementById('ai-key-btn').addEventListener('click', function () {
    var k = (document.getElementById('ai-key-input').value || '').trim();
    if (!k) { document.getElementById('ai-auth-status').textContent = 'Key required.'; return; }
    adminKey = k;
    document.getElementById('ai-auth-screen').style.display = 'none';
    document.getElementById('ai-main').style.display = 'block';
    loadOrders();
  });
  document.getElementById('ai-key-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('ai-key-btn').click();
  });

  document.getElementById('ai-reload-btn').addEventListener('click', loadOrders);
  document.getElementById('ai-filter-q').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') loadOrders();
  });
  document.getElementById('ai-filter-status').addEventListener('change', loadOrders);
  document.getElementById('ai-export-btn').addEventListener('click', function () {
    var rows = [['Order ID', 'Date', 'Name', 'Phone', 'Email', 'Items', 'Address', 'Total', 'Status', 'AWB', 'Test']];
    lastOrders.forEach(function (o) {
      var addr = o.address || {};
      var addrLine = [addr.street, addr.apt, addr.city, addr.state, addr.pin].filter(Boolean).join(', ');
      var itemsLine = (o.items || []).map(function (it) { return (it.name || it.sku || '') + ' x' + (it.qty || it.quantity || 1); }).join(' | ');
      rows.push([o.id, o.created_at || '', o.name || '', o.phone || '', o.email || '', itemsLine, addrLine, o.total, o.status || '', o.shipprime_awb || '', o.test_mode ? 'yes' : '']);
    });
    downloadCsv('saubhagya-orders-' + new Date().toISOString().slice(0, 10) + '.csv', rows);
  });

  function fmtDate(s) {
    if (!s) return '';
    var d = new Date(s.replace(' ', 'T') + (s.indexOf('Z') === -1 ? 'Z' : ''));
    if (isNaN(d.getTime())) return esc(s);
    return d.toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function loadOrders() {
    var status = document.getElementById('ai-load-status');
    var tbody = document.getElementById('ai-tbody');
    var filterStatus = document.getElementById('ai-filter-status').value;
    var q = document.getElementById('ai-filter-q').value.trim();
    status.textContent = 'Loading…';
    tbody.innerHTML = '';

    var params = new URLSearchParams();
    if (filterStatus) params.set('status', filterStatus);
    if (q) params.set('q', q);

    fetch('/api/admin/orders-list?' + params.toString(), {
      headers: { 'x-admin-key': adminKey },
    })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (!d || !d.success) { status.textContent = (d && d.error) || 'Failed to load'; return; }
        lastOrders = d.orders;
        document.getElementById('ai-count').textContent = d.count + ' orders';
        status.textContent = '';
        tbody.innerHTML = d.orders.map(function (o) {
          var addr = o.address || {};
          var addrLine = [addr.street, addr.apt, addr.city, addr.state, addr.pin].filter(Boolean).map(esc).join(', ');
          var items = (o.items || []).map(function (it) {
            return '<div>' + esc(it.name || it.sku || '') + ' × ' + esc(it.qty || it.quantity || 1) + '</div>';
          }).join('');
          var badgeClass = 'b-' + String(o.status || '').toLowerCase().replace(/\s+/g, '_');
          return '<tr>' +
            '<td class="ai-oid">' + esc(o.id) + (o.test_mode ? '<span class="ai-test">TEST</span>' : '') + '</td>' +
            '<td>' + fmtDate(o.created_at) + '</td>' +
            '<td>' + esc(o.name || '') + '<br><span style="color:#9a9a9a">' + esc(o.phone || '') + '</span></td>' +
            '<td class="ai-items">' + items + '</td>' +
            '<td class="ai-addr">' + addrLine + '</td>' +
            '<td>₹' + esc(o.total) + '</td>' +
            '<td><span class="ai-badge ' + badgeClass + '">' + esc(o.status || '') + '</span></td>' +
            '<td class="ai-oid">' + esc(o.shipprime_awb || '—') + '</td>' +
            '</tr>';
        }).join('');
      })
      .catch(function (e) { status.textContent = 'Failed to load: ' + e.message; });
  }
})();
</script>
</body>
</html>
