<!-- AUTO-INJECTED: Track Orders lookup widget -->
<div id="track-app">
  <!-- MY ORDERS (auto-loaded when logged in via mpa.js) -->
  <div id="my-orders" style="display:none;">
    <h2>My Orders</h2>
    <div id="my-orders-list" style="display:flex;flex-direction:column;gap:16px;"></div>
  </div>

  <h2>Look Up Your Order</h2>
  <p>Enter your 10-digit phone number or your order ID (starts with "CC") to find your order.</p>
  <div style="display:flex;gap:12px;align-items:stretch;margin:18px 0 0;flex-wrap:wrap;">
    <input id="track-input" type="text" placeholder="Phone number or Order ID (CC-...)" style="flex:1;min-width:200px;height:52px;padding:0 16px;border:1px solid #ddd6c6;font-family:'Montserrat',sans-serif;font-size:14px;outline:none;background:#fff;">
    <button id="track-btn" style="height:52px;padding:0 28px;background:#0B3C26;color:#fff;border:none;font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:2px;cursor:pointer;white-space:nowrap;">TRACK</button>
  </div>
  <div id="track-status" style="margin-top:12px;"></div>
  <div id="track-results" style="display:flex;flex-direction:column;gap:16px;margin-top:20px;"></div>
</div>

<script>
(function () {
  'use strict';
  var $ = function(id) { return document.getElementById(id); };
  var fmt = function (paise) { return '₹' + Number((paise || 0) / 100).toLocaleString('en-IN'); };
  var fmtDate = function(d) { if (!d) return ''; return new Date(d).toLocaleDateString('en-IN', { year:'numeric', month:'short', day:'numeric' }); };

  function orderCard(o) {
    var statusLabel = (o.status || 'confirmed').toUpperCase();
    var items = (o.items || []).map(function (i) { return (i.name || i.id) + ' ×' + (i.qty || 1); }).join(', ');
    var hasAWB = o.awb && o.awb.trim();
    return '<div style="border:1px solid rgba(197,160,89,.3);padding:20px;background:#fff;">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">' +
        '<div><div style="font-family:\'Cormorant Garamond\',serif;font-size:20px;color:#1A1A1A;font-weight:600;">' + o.id + '</div>' +
        '<div style="font-family:\'Montserrat\',sans-serif;font-size:11px;color:#9a9a9a;margin-top:3px;">' + fmtDate(o.created_at) + '</div></div>' +
        '<span style="font-family:\'Montserrat\',sans-serif;font-size:10px;letter-spacing:2px;padding:5px 12px;background:' + (statusLabel === 'CONFIRMED' ? '#0B3C26' : '#C5A059') + ';color:#fff;">' + statusLabel + '</span>' +
      '</div>' +
      '<div style="font-family:\'Montserrat\',sans-serif;font-size:13px;color:#4a4a4a;margin-top:12px;line-height:1.6;">' +
        '<strong>' + (o.name || 'Customer') + '</strong> · ' + fmt(o.total) +
        '<br><span style="font-size:11px;color:#9a9a9a;">' + items + '</span>' +
      '</div>' +
      (hasAWB ? '<div style="margin-top:10px;padding:10px 12px;background:#e8f0e8;font-size:12px;"><strong style="color:#0B3C26;">AWB: ' + o.awb + '</strong> <a href="' + (o.awb_url || '#') + '" target="_blank" style="margin-left:12px;color:#0B3C26;border-bottom:1px solid #C5A059;text-decoration:none;">Track via Shiprocket →</a></div>' : '') +
    '</div>';
  }

  function mpaOrderCard(o) {
    return '<div style="border:1px solid rgba(197,160,89,.25);padding:16px;background:#FAFAFA;cursor:pointer;" onclick="document.getElementById(\'track-input\').value=\'' + o.id + '\';document.getElementById(\'track-btn\').click();">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;">' +
        '<div style="font-family:\'Cormorant Garamond\',serif;font-size:18px;color:#1A1A1A;font-weight:600;">' + o.id + '</div>' +
        '<span style="font-family:\'Montserrat\',sans-serif;font-size:10px;letter-spacing:1.5px;padding:4px 10px;background:#0B3C26;color:#fff;">' + (o.status || 'confirmed').toUpperCase() + '</span>' +
      '</div>' +
      '<div style="font-family:\'Montserrat\',sans-serif;font-size:12px;color:#6a6a6a;margin-top:6px;">' + fmt(o.total) + ' · ' + fmtDate(o.created_at) + '</div>' +
    '</div>';
  }

  function loadMyOrders() {
    var user = null;
    try { user = window.MPA ? window.MPA.getUser() : null; } catch(e) {}
    if (!user || !(user.email || user.phone)) return;
    var params = [];
    if (user.email) params.push('email=' + encodeURIComponent(user.email));
    if (user.phone) params.push('phone=' + encodeURIComponent(user.phone));
    if (!params.length) return;
    fetch('/api/orders/track?' + params.join('&'))
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (!d || !d.success || !d.orders || !d.orders.length) return;
        $('my-orders').style.display = 'block';
        $('my-orders-list').innerHTML = d.orders.map(mpaOrderCard).join('');
      }).catch(function() {});
  }

  function doTrack() {
    var q = ($('track-input').value || '').trim();
    if (!q) { $('track-status').innerHTML = '<span style="color:#c0392b;font-family:Montserrat,sans-serif;font-size:12px;">Please enter a phone number or order ID.</span>'; return; }
    var isOrderId = /^CC-/i.test(q);
    var url = isOrderId ? '/api/orders/track?order_id=' + encodeURIComponent(q) : '/api/orders/track?phone=' + encodeURIComponent(q);
    $('track-status').innerHTML = '<span style="color:#9a9a9a;font-family:Montserrat,sans-serif;font-size:12px;">Searching…</span>';
    $('track-results').innerHTML = '';
    fetch(url).then(function(r) { return r.json(); }).then(function(d) {
      $('track-status').innerHTML = '';
      if (!d || !d.success || !d.orders || !d.orders.length) {
        $('track-results').innerHTML = '<div style="padding:24px;text-align:center;color:#9a9a9a;font-family:Montserrat,sans-serif;font-size:13px;">No orders found. Check your phone number and try again.</div>';
        return;
      }
      $('track-results').innerHTML = d.orders.map(orderCard).join('');
    }).catch(function() {
      $('track-status').innerHTML = '<span style="color:#c0392b;font-family:Montserrat,sans-serif;font-size:12px;">Network error. Please try again.</span>';
    });
  }

  $('track-btn').addEventListener('click', doTrack);
  $('track-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') doTrack(); });
  if (document.readyState !== 'loading') loadMyOrders();
  else document.addEventListener('DOMContentLoaded', loadMyOrders);
})();
</script>
