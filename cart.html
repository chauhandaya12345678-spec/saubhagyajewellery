<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Bag | Saubhagya</title>
<meta name="robots" content="noindex,follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css?v=20260722a">
<script src="layout.js?v=20260722a"></script>
<script src="mpa.js?v=13" defer></script>
<script src="catalog.js?v=13"></script>
<style>
  * { box-sizing: border-box; }
  body { background: #F0F5FA; margin: 0; }
  .cart-wrap { max-width: 900px; margin: 0 auto; padding: 20px 24px 80px; }
  .cart-empty { text-align: center; padding: 60px 24px; }
  .cart-empty h1 { font-family:'Playfair Display',serif; font-size: 28px; color: #1A1A1A; margin: 0 0 10px; }
  .cart-empty p { font-family: 'Montserrat',sans-serif; font-size: 13px; color: #6a6a6a; margin: 0 0 24px; }
  .cart-empty a { display: inline-block; padding: 14px 28px; background: #0B291C; color: #fff; font-family: 'Montserrat',sans-serif; font-size:13px; letter-spacing:1.5px; text-decoration: none; border-radius: 14px; box-shadow: 0 2px 8px rgba(11,41,28,.15); transition: all .4s cubic-bezier(.25,1,.5,1); }
  .cart-empty a:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(11,41,28,.25); background: #071B12; }
  .cart-item { display: flex; gap: 16px; padding: 20px 0; border-bottom: 1px solid #eae5d8; }
  .cart-item-img { width: 80px; height: 100px; flex: none; object-fit: cover; background: #eae5d8; border-radius: 10px; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-family:'Playfair Display',serif; font-size: 18px; color: #1A1A1A; }
  .cart-item-price { font-family: 'Montserrat',sans-serif; font-size: 13px; color: #0B291C; margin-top: 4px; }
  .cart-item-qty { display: flex; align-items: center; gap: 0; margin-top: 10px; border: 1px solid #ddd6c6; border-radius: 14px; overflow: hidden; width: fit-content; }
  .cart-item-qty span { width: 30px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; user-select: none; transition: all .2s; }
  .cart-item-qty .cq { border-left: 1px solid #ddd6c6; border-right: 1px solid #ddd6c6; width: 34px; font-size: 12px; }
  .cart-item-qty span:not(.cq):hover { background: #0B291C; color: #fff; }
  .cart-item-remove { font-family: 'Montserrat',sans-serif; font-size: 10px; letter-spacing: 1px; color: #9a9a9a; cursor: pointer; margin-top: 8px; }
  .cart-summary { margin-top: 28px; padding: 20px; background: #fff; border: 1px solid #eae5d8; border-radius: 16px; max-width: 420px; margin-left: auto; margin-right: auto; }
  .cart-summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-family: 'Montserrat',sans-serif; font-size: 13px; color: #4a4a4a; }
  .cart-summary-total { display: flex; justify-content: space-between; padding: 14px 0 0; margin-top: 8px; border-top: 1px solid #eae5d8; }
  .cart-summary-total span:last-child { font-family:'Playfair Display',serif; font-size: 22px; font-weight: 600; color: #0B291C; }
  .cart-checkout { display: block; width: 100%; margin-top: 16px; padding: 16px; background: #0B291C; color: #fff; border: none; border-radius: 14px; font-family: 'Montserrat',sans-serif; font-size: 12px; font-weight: 600; letter-spacing:1.5px; cursor: pointer; text-align: center; text-decoration: none; box-shadow: 0 2px 8px rgba(11,41,28,.18); transition: all .4s cubic-bezier(.25,1,.5,1); }
  .cart-checkout:hover { background: #071B12; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(11,41,28,.28); }
  .cart-continue { display: block; margin-top: 12px; text-align: center; font-family: 'Montserrat',sans-serif; font-size:13px; color: #9a9a9a; letter-spacing: 1px; }
  .cart-continue a { color: #0B291C; text-decoration: none; border-bottom: 1px solid #C5A880; padding-bottom: 1px; }
  .cart-loading { text-align: center; padding: 40px; font-family: 'Montserrat',sans-serif; font-size: 12px; color: #9a9a9a; letter-spacing:1.5px; }
  @media (max-width: 640px) {
    .cart-wrap { padding: 10px 14px calc(96px + env(safe-area-inset-bottom)); }
    .cart-item { padding: 16px 0; gap: 12px; }
    .cart-item-img { width: 72px; height: 90px; border-radius: 8px; }
    .cart-item-name { font-size: 15px; line-height: 1.28; }
    .cart-item-qty span { width: 38px; height: 40px; font-size: 15px; }
    .cart-item-qty .cq { width: 42px; }
    .cart-item-remove { font-size:13px; padding: 8px 0; }
    .cart-summary { padding: 16px; border-radius: 10px; }
    .cart-summary-total span:last-child { font-size: 20px; }
    /* Sticky checkout button so it's always in thumb reach */
    .cart-summary { position: sticky; bottom: calc(env(safe-area-inset-bottom) + 8px); z-index: 20; box-shadow: 0 -10px 30px rgba(11,41,28,.08); }
  }
</style>
</head>
<body>
<x-layout page=""></x-layout>
<main>
<div class="cart-wrap">
  <div class="cart-loading" id="cart-loading">LOADING YOUR BAG…</div>
  <div class="cart-empty" id="cart-empty" style="display:none">
    <h1>Your bag is empty</h1>
    <p>Discover handcrafted imitation jewellery made for every occasion.</p>
    <a href="index.html" class="ct-btn">CONTINUE SHOPPING</a>
  </div>
  <div id="cart-content" style="display:none">
    <h1 style="font-family:'Playfair Display',serif;font-size:24px;color:#1A1A1A;margin:0 0 20px;">Your Bag</h1>
    <div id="cart-items"></div>
    <div class="cart-summary" id="cart-summary" style="display:none">
      <div class="cart-summary-row"><span>Subtotal</span><span id="cart-subtotal"></span></div>
      <div class="cart-summary-row"><span>Shipping</span><span id="cart-shipping" style="color:#0B291C;">FREE (included)</span></div>
      <div class="cart-summary-total"><span>Estimated Total</span><span id="cart-total"></span></div>
      <a class="cart-checkout" href="checkout.html" id="cart-checkout-btn">PROCEED TO CHECKOUT</a>
    </div>
    <div class="cart-continue"><a href="index.html">← Continue Shopping</a></div>
  </div>
</div>
</main>
<x-footer></x-footer>

<script>
(function () {
  'use strict';
  var $ = function(id) { return document.getElementById(id); };
  var fmt = function(n) { return '₹' + Number(n || 0).toLocaleString('en-IN'); };
  var cartItems = [];
  var products = {};

  function loadCart() {
    try {
      cartItems = JSON.parse(localStorage.getItem('cc_cart') || '[]');
      if (!Array.isArray(cartItems)) cartItems = [];
      cartItems = cartItems.filter(function(i) { return i && i.id && i.qty > 0; });
    } catch(e) { cartItems = []; }
    return cartItems;
  }

  function saveCart() {
    try { localStorage.setItem('cc_cart', JSON.stringify(cartItems)); } catch(e) {}
    // Sync with MPA
    if (window.MPA) { try { window.MPA.setCart(cartItems); } catch(e) {} }
  }

  function render() {
    if (!cartItems.length) {
      $('cart-loading').style.display = 'none';
      $('cart-empty').style.display = 'block';
      return;
    }

    var subtotal = 0;
    var html = '';
    cartItems.forEach(function(ci, idx) {
      var p = products[ci.id] || { name: ci.id, price: 0, image: '' };
      var lineTotal = (p.price || 0) * ci.qty;
      subtotal += lineTotal;
      html += '<div class="cart-item">' +
        '<img class="cart-item-img" src="' + (p.image || '') + '" alt="' + (p.name || '') + '" onerror="this.style.display=\'none\'">' +
        '<div class="cart-item-info">' +
          '<div class="cart-item-name">' + (p.name || ci.id) + '</div>' +
          '<div class="cart-item-price">' + fmt(p.price) + ' each</div>' +
          '<div class="cart-item-qty">' +
            '<span onclick="Cart.dec(' + idx + ')">−</span>' +
            '<span class="cq">' + ci.qty + '</span>' +
            '<span onclick="Cart.inc(' + idx + ')">+</span>' +
          '</div>' +
          '<div class="cart-item-remove" onclick="Cart.remove(' + idx + ')">REMOVE</div>' +
        '</div>' +
      '</div>';
    });

    $('cart-items').innerHTML = html;
    $('cart-subtotal').textContent = fmt(subtotal);
    $('cart-total').textContent = fmt(subtotal);
    $('cart-summary').style.display = 'block';
    $('cart-loading').style.display = 'none';
    $('cart-content').style.display = 'block';
  }

  function useCatalogFallback() {
    (window.CHAUHAN_CATALOG || []).forEach(function(p) {
      var k = p.id || p.sku;
      if (!products[k]) products[k] = p;
    });
  }

  function fetchProducts() {
    var skus = cartItems.map(function(i) { return i.id; });
    if (!skus.length) { render(); return; }
    fetch('/api/products')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var list = Array.isArray(data) ? data : (data.products || []);
        list.forEach(function(p) { products[p.sku || p.id] = p; });
        useCatalogFallback();
        render();
      })
      .catch(function() {
        // API unreachable — catalog.js static fallback still has names/prices
        useCatalogFallback();
        if (!Object.keys(products).length) {
          var retry = 0;
          var poll = setInterval(function() {
            useCatalogFallback();
            if (Object.keys(products).length || ++retry > 30) { clearInterval(poll); render(); }
          }, 150);
          return;
        }
        render();
      });
  }

  window.Cart = {
    dec: function(idx) {
      if (cartItems[idx].qty <= 1) { this.remove(idx); return; }
      cartItems[idx].qty--;
      saveCart();
      render();
    },
    inc: function(idx) {
      cartItems[idx].qty++;
      saveCart();
      render();
    },
    remove: function(idx) {
      cartItems.splice(idx, 1);
      saveCart();
      loadCart();
      if (!cartItems.length) {
        $('cart-content').style.display = 'none';
        $('cart-loading').style.display = 'none';
        $('cart-empty').style.display = 'block';
        return;
      }
      render();
    }
  };

  loadCart();
  if (cartItems.length) fetchProducts(); else render();
})();
</script>
</body>
</html>
