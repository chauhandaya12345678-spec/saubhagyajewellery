<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset Password | Saubhagya</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css?v=10">
<script src="layout.js?v=10"></script>
<script src="mpa.js?v=10" defer></script>
<style>
  * { box-sizing: border-box; }
  body { background: #FAFAFA; margin: 0; }
  .rp-wrap { max-width: 440px; margin: 0 auto; padding: 40px 24px 80px; text-align: center; }
  .rp-title { font-family: 'Cormorant Garamond',serif; font-size: 28px; color: #1A1A1A; margin: 0 0 6px; }
  .rp-sub { font-family: 'Montserrat',sans-serif; font-size: 12px; color: #9a9a9a; margin: 0 0 28px; line-height: 1.6; }
  .rp-input { display: block; width: 100%; height: 48px; padding: 0 14px; border: 1px solid #ddd6c6; font-family: 'Montserrat',sans-serif; font-size: 14px; outline: none; background: #fff; margin-bottom: 14px; }
  .rp-input:focus { border-color: #C5A059; }
  .rp-btn { display: block; width: 100%; padding: 16px; background: #0B3C26; color: #fff; border: none; font-family: 'Montserrat',sans-serif; font-size: 11px; letter-spacing: 2px; cursor: pointer; }
  .rp-btn:disabled { opacity: .5; cursor: not-allowed; }
  .rp-msg { font-family: 'Montserrat',sans-serif; font-size: 12px; margin: 14px 0 0; min-height: 20px; }
  .rp-msg.error { color: #c0392b; }
  .rp-msg.success { color: #0B3C26; }
  .rp-link { display: inline-block; margin-top: 22px; font-family: 'Montserrat',sans-serif; font-size: 12px; color: #0B3C26; text-decoration: none; border-bottom: 1px solid #C5A059; padding-bottom: 2px; }
</style>
</head>
<body>
<x-layout page=""></x-layout>
<main>
<div class="rp-wrap">
  <h1 class="rp-title">Reset Your Password</h1>
  <p class="rp-sub" id="rp-text">Enter a new password for your Saubhagya account.</p>
  <input class="rp-input" id="rp-password" type="password" placeholder="New password (min 6 chars)" autocomplete="new-password">
  <button class="rp-btn" id="rp-btn">RESET PASSWORD</button>
  <div class="rp-msg" id="rp-msg"></div>
  <a class="rp-link" href="signin.html">← Back to sign in</a>
</div>
</main>
<x-footer></x-footer>

<script>
(function () {
  'use strict';
  var $ = function (id) { return document.getElementById(id); };
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var msg = $('rp-msg'), btn = $('rp-btn'), pw = $('rp-password'), txt = $('rp-text');
  if (!token) {
    txt.textContent = 'No reset link found. Please request a new password reset.';
    btn.style.display = 'none'; pw.style.display = 'none';
    return;
  }
  btn.addEventListener('click', function () {
    var val = pw.value.trim();
    if (val.length < 6) { msg.className = 'rp-msg error'; msg.textContent = 'Password must be at least 6 characters'; return; }
    btn.disabled = true; btn.textContent = 'RESETTING…';
    msg.className = 'rp-msg'; msg.textContent = '';
    fetch('/api/auth/reset-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, new_password: val }),
    }).then(function (r) { return r.json(); }).then(function (d) {
      if (d.success) {
        msg.className = 'rp-msg success'; msg.textContent = 'Password reset! Redirecting to sign in…';
        setTimeout(function () { window.location.href = 'signin.html'; }, 1400);
      } else {
        msg.className = 'rp-msg error'; msg.textContent = d.error || 'Something went wrong. Please try again.';
        btn.disabled = false; btn.textContent = 'RESET PASSWORD';
      }
    }).catch(function () {
      msg.className = 'rp-msg error'; msg.textContent = 'Network error. Please try again.';
      btn.disabled = false; btn.textContent = 'RESET PASSWORD';
    });
  });
  pw.addEventListener('keydown', function (e) { if (e.key === 'Enter') btn.click(); });
})();
</script>
</body>
</html>
