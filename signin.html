<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign In | Saubhagya</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css?v=20260722l">
<script src="layout.js?v=20260724a"></script>
<script src="mpa.js?v=14" defer></script>
<style>
  * { box-sizing: border-box; }
  body { background: #F0F5FA; margin: 0; }
  .auth-wrap { max-width: 440px; margin: 0 auto; padding: 40px 24px 80px; }
  .auth-title { font-family:'Playfair Display',serif; font-size: 28px; color: #1A1A1A; text-align: center; margin: 0 0 6px; }
  .auth-sub { font-family: 'Montserrat',sans-serif; font-size: 12px; color: #9a9a9a; text-align: center; margin: 0 0 28px; }
  .auth-label { display: block; font-family: 'Montserrat',sans-serif; font-size: 10px; letter-spacing: 1.5px; color: #6a6a6a; margin-bottom: 6px; text-transform: uppercase; }
  .auth-input { width: 100%; height: 48px; padding: 0 14px; border: 1px solid #ddd6c6; font-family: 'Montserrat',sans-serif; font-size: 14px; outline: none; background: #fff; margin-bottom: 14px; }
  .auth-input:focus { border-color: #C5A880; }
  .auth-btn { display: block; width: 100%; padding: 16px; background: #0B291C; color: #fff; border: none; font-family: 'Montserrat',sans-serif; font-size:13px; letter-spacing:1.5px; cursor: pointer; border-radius: 14px; box-shadow: 0 2px 8px rgba(11,41,28,.15); transition: all .4s cubic-bezier(.25,1,.5,1); }
  .auth-btn:hover:not(:disabled) { background: #071B12; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(11,41,28,.25); }
  .auth-btn:disabled { opacity: .6; cursor: not-allowed; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.35); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:8px; position:relative; top:-1px; }
  .auth-error { color: #c0392b; font-family: 'Montserrat',sans-serif; font-size:13px; text-align: center; margin: 12px 0; display: none; }
  .auth-success { color: #0B291C; font-family: 'Montserrat',sans-serif; font-size: 13px; text-align: center; margin: 12px 0; display: none; }
  .auth-link { text-align: center; margin-top: 18px; font-family: 'Montserrat',sans-serif; font-size: 12px; color: #9a9a9a; }
  .auth-link a { color: #0B291C; text-decoration: none; border-bottom: 1px solid #C5A880; }
  .auth-logged { text-align: center; padding: 40px 0; }
  .auth-logged h2 { font-family:'Playfair Display',serif; font-size: 24px; color: #1A1A1A; margin: 0; }
  .auth-logged button { margin-top: 16px; padding: 12px 24px; background: transparent; border: 1px solid #C5A880; font-family: 'Montserrat',sans-serif; font-size:13px; letter-spacing: 1.5px; cursor: pointer; }
</style>
</head>
<body>
<x-layout page=""></x-layout>
<main>
<div class="auth-wrap">
  <div id="auth-logged" style="display:none" class="auth-logged">
    <h2 id="auth-uname"></h2>
    <p style="font-family:'Montserrat',sans-serif;font-size:13px;color:#6a6a6a;">You are signed in</p>
    <button id="auth-logout">SIGN OUT</button>
    <div class="auth-link"><a href="index.html">← Continue Shopping</a></div>
  </div>
  <div id="auth-form">
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Sign in with your mobile number — we'll text you a code</p>

    <div id="phone-section">
      <label class="auth-label">Mobile Number</label>
      <input class="auth-input" id="phone-input" type="tel" inputmode="numeric" maxlength="10" placeholder="10-digit mobile number">
      <button class="auth-btn" id="send-btn" type="button">SEND OTP</button>
    </div>

    <div id="otp-section" style="display:none">
      <label class="auth-label">6-Digit Code</label>
      <input class="auth-input" id="otp-input" type="tel" inputmode="numeric" maxlength="6" placeholder="000000" style="letter-spacing:8px;font-size:20px;text-align:center;font-weight:600;">
      <button class="auth-btn" id="verify-btn" type="button">VERIFY & SIGN IN</button>
    </div>

    <div class="auth-error" id="auth-error"></div>
    <div class="auth-success" id="auth-success"></div>

    <!-- Turnstile widget must stay in layout (not display:none): when Cloudflare
         escalates to an interactive challenge it renders here — hiding the
         container left the SEND button spinning forever. -->
    <div id="ts-container" class="cf-turnstile" data-sitekey="0x4AAAAAAD7dybSbH-6hyTGP" data-execution="execute" data-callback="__tsToken" data-error-callback="__tsError" data-timeout-callback="__tsError" style="margin:10px auto;text-align:center"></div>
    <div id="recaptcha-container"></div>

    <div class="auth-link">New here? Sign in with your phone — your account will be created automatically.</div>
  </div>
</div>
</main>
<x-footer></x-footer>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import { initializeAppCheck, ReCaptchaEnterpriseProvider } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app-check.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTOVlCY_seyeR49jEtsKBgjCNAMsA4rtw",
  authDomain: "saubhagya-jewellery.firebaseapp.com",
  projectId: "saubhagya-jewellery",
  storageBucket: "saubhagya-jewellery.firebasestorage.app",
  messagingSenderId: "520764963734",
  appId: "1:520764963734:web:bf3e568a4bce172b33fbb7"
};

const app = initializeApp(firebaseConfig);

// App Check is best-effort: if the reCAPTCHA Enterprise key/script is broken
// or blocked, a thrown error here used to kill this whole module — every
// button on the page went dead. Sign-in must survive App Check failure.
try {
  initializeAppCheck(app, {
    provider: new ReCaptchaEnterpriseProvider('6LeLr1ItAAAAAEIeh4d-4FUit9chB11D8SjyNPhw'),
    isTokenAutoRefreshEnabled: true
  });
} catch (e) {
  console.warn('App Check init failed (continuing without):', e && e.message);
}

const auth = getAuth(app);

var $ = function(id) { return document.getElementById(id); };
function setLoading(btn, label) { btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span>' + label; }
function clearLoading(btn, label) { btn.disabled = false; btn.textContent = label; }
window.confirmationResult = null;
window.recaptchaVerifier = null;
var pendingPhone = null;

// Google's "invisible" reCAPTCHA can still fall back to a visible challenge
// when it can't silently verify the session. When that happens the send
// button should stop looking like a frozen spinner and tell the customer
// there's something to do below.
(function watchRecaptchaChallenge() {
  if (!window.MutationObserver) return;
  var boxes = [document.getElementById('recaptcha-container'), document.getElementById('ts-container')].filter(Boolean);
  boxes.forEach(function (box) {
    var mo = new MutationObserver(function () {
      var btn = $('send-btn');
      if (btn && btn.disabled && box.querySelector('iframe')) {
        btn.innerHTML = 'COMPLETE VERIFICATION BELOW ↓';
      }
    });
    mo.observe(box, { childList: true, subtree: true });
  });
})();

var user = null;
try { user = window.MPA ? window.MPA.getUser() : null; } catch(e) {}
if (user && user.id) {
  $('auth-form').style.display = 'none';
  $('auth-logged').style.display = 'block';
  $('auth-uname').textContent = 'Hi, ' + (user.name || '');
}

$('auth-logout').addEventListener('click', function() {
  if (window.MPA) window.MPA.signOut();
  try { localStorage.removeItem('cc_user'); localStorage.removeItem('cc_token'); } catch(e) {}
  $('auth-logged').style.display = 'none';
  $('auth-form').style.display = 'block';
});

function showError(msg) { $('auth-success').style.display='none'; $('auth-error').textContent=msg; $('auth-error').style.display='block'; }
function showInfo(msg) { $('auth-error').style.display='none'; $('auth-success').textContent=msg; $('auth-success').style.display='block'; }

// Cloudflare Turnstile pre-gate: a real server-verified bot check that runs
// BEFORE Firebase's own reCAPTCHA gets involved at all. Doesn't remove
// Firebase's internal captcha requirement (Google controls that), but stops
// obvious bot traffic earlier, invisibly, with no image challenge.
function startFirebaseOtp(phone) {
  if (!window.recaptchaVerifier) {
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
      'size': 'invisible',
      'callback': function() { /* Solved silently */ }
    });
  }
  signInWithPhoneNumber(auth, '+91' + phone, window.recaptchaVerifier)
    .then(function(result) {
      clearTimeout(sendWatchdog);
      window.confirmationResult = result;
      $('send-btn').textContent = 'OTP SENT';
      $('phone-section').style.display = 'none';
      $('otp-section').style.display = 'block';
      showInfo('Code sent to +91 ' + phone);
      $('otp-input').focus();
    })
    .catch(function(err) {
      clearTimeout(sendWatchdog);
      clearLoading($('send-btn'), 'SEND OTP');
      if (window.recaptchaVerifier) {
        window.recaptchaVerifier.clear();
        window.recaptchaVerifier = null;
      }
      showError(err.message || 'Could not send OTP. Try again.');
    });
}

window.__tsToken = function(token) {
  fetch('/api/auth/turnstile-verify', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: token })
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success) startFirebaseOtp(pendingPhone);
      else { clearLoading($('send-btn'), 'SEND OTP'); showError('Verification failed. Please try again.'); }
    }).catch(function() {
      // Turnstile check unreachable — fail open to Firebase rather than
      // blocking sign-in entirely over an outage of an extra safety layer.
      startFirebaseOtp(pendingPhone);
    });
};
window.__tsError = function() {
  // Same reasoning — don't let a Turnstile hiccup block sign-in.
  startFirebaseOtp(pendingPhone);
};

// Watchdog: whatever silently stalls (Turnstile, reCAPTCHA, App Check,
// network), never leave the customer on an infinite spinner — reset the
// button and say so.
var sendWatchdog = null;
function armWatchdog() {
  clearTimeout(sendWatchdog);
  sendWatchdog = setTimeout(function () {
    var btn = $('send-btn');
    if (btn.disabled && !window.confirmationResult) {
      clearLoading(btn, 'SEND OTP');
      if (window.recaptchaVerifier) { try { window.recaptchaVerifier.clear(); } catch (e) {} window.recaptchaVerifier = null; }
      showError('Taking too long — please tap SEND OTP again. If it repeats, check your connection or try another browser.');
    }
  }, 25000);
}

$('send-btn').addEventListener('click', function() {
  var phone = ($('phone-input').value || '').replace(/\D/g, '');
  if (phone.length !== 10) { showError('Enter a valid 10-digit mobile number.'); return; }

  $('auth-error').style.display = 'none';
  $('auth-success').style.display = 'none';
  setLoading($('send-btn'), 'SENDING…');
  pendingPhone = phone;
  armWatchdog();

  if (window.turnstile) {
    try {
      try { turnstile.reset('#ts-container'); } catch (e) {}
      turnstile.execute('#ts-container');
    } catch (e) {
      // Turnstile present but broken (bad render/sitekey) — don't block sign-in
      startFirebaseOtp(phone);
    }
  } else {
    startFirebaseOtp(phone);
  }
});

$('verify-btn').addEventListener('click', function() {
  var code = ($('otp-input').value || '').replace(/\D/g, '');
  if (!code || code.length !== 6) { showError('Enter the 6-digit code.'); return; }
  if (!window.confirmationResult) { showError('Session expired. Please request a new OTP.'); return; }

  setLoading($('verify-btn'), 'VERIFYING…');
  $('auth-error').style.display = 'none';

  window.confirmationResult.confirm(code)
    .then(function(result) {
      var user = result.user;
      var phone = (user.phoneNumber || '').replace(/\D/g, '').slice(-10);
      return user.getIdToken().then(function(idToken) {
        return fetch('/api/auth/firebase-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken: idToken, phone: phone })
        }).then(function(r) { return r.json(); }).catch(function() {
          return { success: true, token: 'local_'+Date.now().toString(36), user: { id: 0, name: '', phone: phone } };
        });
      });
    })
    .then(function(d) {
      if (d.success) {
        try { localStorage.setItem('cc_user', JSON.stringify(d.user)); } catch(e) {}
        try { localStorage.setItem('cc_token', d.token); } catch(e) {}
        if (window.MPA) window.MPA.init();
        // Redirect to previous page or home instead of showing "Hi Guest"
        var ref = document.referrer;
        window.location.href = (ref && ref.indexOf('/signin') === -1) ? ref : '/index.html';
      } else {
        showError(d.error || 'Sign in failed.');
        clearLoading($('verify-btn'), 'VERIFY & SIGN IN');
      }
    })
    .catch(function(err) {
      clearLoading($('verify-btn'), 'VERIFY & SIGN IN');
      showError('Wrong code or verification expired. Please try again.');
    });
});

$('otp-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') $('verify-btn').click();
});
$('otp-input').addEventListener('input', function() {
  if (this.value.replace(/\D/g, '').length === 6) $('verify-btn').click();
});
</script>
</body>
</html>
