<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign In | Saubhagya</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css?v=14">
<script src="layout.js?v=13"></script>
<script src="mpa.js?v=13" defer></script>
<style>
  * { box-sizing: border-box; }
  body { background: #FAFAFA; margin: 0; }
  .auth-wrap { max-width: 440px; margin: 0 auto; padding: 40px 24px 80px; }
  .auth-title { font-family: 'Cormorant Garamond',serif; font-size: 28px; color: #1A1A1A; text-align: center; margin: 0 0 6px; }
  .auth-sub { font-family: 'Montserrat',sans-serif; font-size: 12px; color: #9a9a9a; text-align: center; margin: 0 0 28px; }
  .auth-label { display: block; font-family: 'Montserrat',sans-serif; font-size: 10px; letter-spacing: 1.5px; color: #6a6a6a; margin-bottom: 6px; text-transform: uppercase; }
  .auth-input { width: 100%; height: 48px; padding: 0 14px; border: 1px solid #ddd6c6; font-family: 'Montserrat',sans-serif; font-size: 14px; outline: none; background: #fff; margin-bottom: 14px; }
  .auth-input:focus { border-color: #C5A059; }
  .auth-btn { display: block; width: 100%; padding: 16px; background: #0B3C26; color: #fff; border: none; font-family: 'Montserrat',sans-serif; font-size: 11px; letter-spacing: 2px; cursor: pointer; }
  .auth-btn:hover:not(:disabled) { background: #06281a; }
  .auth-btn:disabled { opacity: .6; cursor: not-allowed; }
  .auth-error { color: #c0392b; font-family: 'Montserrat',sans-serif; font-size: 11px; text-align: center; margin: 12px 0; display: none; }
  .auth-success { color: #0B3C26; font-family: 'Montserrat',sans-serif; font-size: 13px; text-align: center; margin: 12px 0; display: none; }
  .auth-link { text-align: center; margin-top: 18px; font-family: 'Montserrat',sans-serif; font-size: 12px; color: #9a9a9a; }
  .auth-link a { color: #0B3C26; text-decoration: none; border-bottom: 1px solid #C5A059; }
  .auth-logged { text-align: center; padding: 40px 0; }
  .auth-logged h2 { font-family: 'Cormorant Garamond',serif; font-size: 24px; color: #1A1A1A; margin: 0; }
  .auth-logged button { margin-top: 16px; padding: 12px 24px; background: transparent; border: 1px solid #C5A059; font-family: 'Montserrat',sans-serif; font-size: 11px; letter-spacing: 1.5px; cursor: pointer; }
</style>
</head>
<body>
<x-layout page=""></x-layout>
<main>
<div class="auth-wrap">
  <div id="auth-logged" style="display:none" class="auth-logged">
    <h2 id="auth-uname"></h2>
    <p style="font-family:'Montserrat',sans-serif;font-size:13px;color:#6a6a6a;">You are signed in</p>
    <button id="auth-logout">SIGN OUT</button>
    <div class="auth-link"><a href="index.html">← Continue Shopping</a></div>
  </div>
  <div id="auth-form">
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Sign in with your mobile number — we'll text you a code</p>

    <div id="phone-section">
      <label class="auth-label">Mobile Number</label>
      <input class="auth-input" id="phone-input" type="tel" inputmode="numeric" maxlength="10" placeholder="10-digit mobile number">
      <button class="auth-btn" id="send-btn" type="button">SEND OTP</button>
    </div>

    <div id="otp-section" style="display:none">
      <label class="auth-label">6-Digit Code</label>
      <input class="auth-input" id="otp-input" type="tel" inputmode="numeric" maxlength="6" placeholder="000000" style="letter-spacing:8px;font-size:20px;text-align:center;font-weight:600;">
      <button class="auth-btn" id="verify-btn" type="button">VERIFY & SIGN IN</button>
    </div>

    <div class="auth-error" id="auth-error"></div>
    <div class="auth-success" id="auth-success"></div>

    <div class="auth-link">New here? Sign in with your phone — your account will be created automatically.</div>
  </div>
</div>
</main>
<x-footer></x-footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTOVlCY_seyeR49jEtsKBgjCNAMsA4rtw",
  authDomain: "saubhagya-jewellery.firebaseapp.com",
  projectId: "saubhagya-jewellery",
  storageBucket: "saubhagya-jewellery.firebasestorage.app",
  messagingSenderId: "520764963734",
  appId: "1:520764963734:web:bf3e568a4bce172b33fbb7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

var $ = function(id) { return document.getElementById(id); };
window.confirmationResult = null;

// Already logged in?
var user = null;
try { user = window.MPA ? window.MPA.getUser() : null; } catch(e) {}
if (user && user.id) {
  $('auth-form').style.display = 'none';
  $('auth-logged').style.display = 'block';
  $('auth-uname').textContent = 'Hi, ' + (user.name || '');
}

$('auth-logout').addEventListener('click', function() {
  if (window.MPA) window.MPA.signOut();
  try { localStorage.removeItem('cc_user'); localStorage.removeItem('cc_token'); } catch(e) {}
  $('auth-logged').style.display = 'none';
  $('auth-form').style.display = 'block';
});

function showError(msg) { $('auth-success').style.display='none'; $('auth-error').textContent=msg; $('auth-error').style.display='block'; }
function showInfo(msg) { $('auth-error').style.display='none'; $('auth-success').textContent=msg; $('auth-success').style.display='block'; }

$('send-btn').addEventListener('click', function() {
  var phone = ($('phone-input').value || '').replace(/\D/g, '');
  if (phone.length !== 10) { showError('Enter a valid 10-digit mobile number.'); return; }
  $('auth-error').style.display = 'none';
  $('auth-success').style.display = 'none';
  $('send-btn').disabled = true;
  $('send-btn').textContent = 'SENDING…';

  // Invisible reCAPTCHA — bound to button, no container div, no checkbox
  var verifier = new RecaptchaVerifier(auth, 'send-btn', {
    'size': 'invisible',
    'callback': function() { /* passed silently */ }
  });

  signInWithPhoneNumber(auth, '+91' + phone, verifier)
    .then(function(result) {
      window.confirmationResult = result;
      $('send-btn').textContent = 'OTP SENT';
      $('phone-section').style.display = 'none';
      $('otp-section').style.display = 'block';
      showInfo('Code sent to +91 ' + phone);
      $('otp-input').focus();
    })
    .catch(function(err) {
      $('send-btn').disabled = false;
      $('send-btn').textContent = 'SEND OTP';
      showError(err.message || 'Could not send OTP. Try again.');
    });
});

$('verify-btn').addEventListener('click', function() {
  var code = ($('otp-input').value || '').replace(/\D/g, '');
  if (!code || code.length < 4) { showError('Enter the 6-digit code.'); return; }
  if (!window.confirmationResult) { showError('Session expired. Please request a new OTP.'); return; }
  $('verify-btn').disabled = true;
  $('verify-btn').textContent = 'VERIFYING…';
  $('auth-error').style.display = 'none';

  window.confirmationResult.confirm(code)
    .then(function(result) {
      var user = result.user;
      var phone = (user.phoneNumber || '').replace(/\D/g, '').slice(-10);

      return user.getIdToken().then(function(idToken) {
        return fetch('/api/auth/firebase-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken: idToken, phone: phone })
        }).then(function(r) { return r.json(); }).catch(function() {
          return { success: true, token: 'local_'+Date.now().toString(36), user: { id: 0, name: '', phone: phone } };
        });
      });
    })
    .then(function(d) {
      if (d.success) {
        try { localStorage.setItem('cc_user', JSON.stringify(d.user)); } catch(e) {}
        try { localStorage.setItem('cc_token', d.token); } catch(e) {}
        if (window.MPA) window.MPA.init();
        $('auth-form').style.display = 'none';
        $('auth-logged').style.display = 'block';
        $('auth-uname').textContent = 'Hi, ' + (d.user.name || '');
      } else {
        showError(d.error || 'Sign in failed.');
        $('verify-btn').disabled = false;
        $('verify-btn').textContent = 'VERIFY & SIGN IN';
      }
    })
    .catch(function(err) {
      $('verify-btn').disabled = false;
      $('verify-btn').textContent = 'VERIFY & SIGN IN';
      showError(err.message || 'Wrong code. Please try again.');
    });
});

$('otp-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') $('verify-btn').click();
});
</script>
</body>
</html>
