<style>
  .track-form { display:flex; flex-direction:column; gap:12px; margin:18px 0 0; max-width:480px; }
  .track-row { display:flex; gap:12px; flex-wrap:wrap; }
  .track-row input { flex:1; min-width:180px; height:52px; padding:0 16px; border:1px solid #ddd6c6; font-family:'Montserrat',sans-serif; font-size:14px; outline:none; background:#fff; }
  .track-row input:focus { border-color:#C5A059; }
  .track-btn { height:52px; padding:0 28px; background:#0B3C26; color:#fff; border:none; font-family:'Montserrat',sans-serif; font-size:11px; letter-spacing:2px; cursor:pointer; white-space:nowrap; align-self:flex-start; }
  .track-btn:disabled { opacity:.6; cursor:not-allowed; }
  .order-card { border:1px solid rgba(197,160,89,.3); border-radius:10px; padding:18px 20px; background:#fff; margin-bottom:16px; }
  .order-id-font { font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; letter-spacing:1px; color:#0B3C26; font-variant-numeric:tabular-nums; }

<body>

<main>
<nav class="crumb"><a href="index.html">Home</a><i>/</i><span>Track Orders</span></nav>
<section class="ph">
  <div class="kicker">ORDER STATUS</div>
  <h1>Track Orders</h1>
  <p class="lede">Enter your phone number and order ID to check your delivery status.</p>
</section>
<section class="prose">
<div id="track-app">
  <h2>Look Up Your Order</h2>
  <p>Both phone number and order ID are required for privacy.</p>
  <div class="track-form">
    <div class="track-row">
      <input id="track-phone" type="tel" inputmode="numeric" maxlength="10" placeholder="10-digit mobile number">
      <input id="track-oid" type="text" placeholder="Order ID (CC-...)" style="text-transform:uppercase;">
    </div>
    <button class="track-btn" id="track-btn">TRACK</button>
  </div>
  <div id="track-status" style="margin-top:12px;"></div>
  <div id="track-results" style="display:flex;flex-direction:column;gap:16px;margin-top:20px;"></div>
</div>

<script>
(function () {
  'use strict';
  var $ = function(id) { return document.getElementById(id); };
  var fmt = function (paise) { return '₹' + Number((paise || 0) / 100).toLocaleString('en-IN'); };
  var fmtDate = function(d) { if (!d) return ''; return new Date(String(d).replace(' ', 'T') + 'Z').toLocaleDateString('en-IN', { month:'short', day:'numeric', year:'numeric' }); };
  var CATALOG = {};
  function hydrateCatalog() {
    var list = window.CHAUHAN_CATALOG || [];
    list.forEach(function(p) { CATALOG[p.id || p.sku] = p; });
  }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>\"]/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]; }); }

  function maskPhone(ph) {
    var d = String(ph || '').replace(/\D/g, '').slice(-10);
    if (d.length < 6) return '***';
    return '+91 ' + d.slice(0, 5) + 'XXXXX';
  }

  function itemsHtml(items) {
    items = items || [];
    return items.map(function(i) {
      var sku = i.id || i.sku || '';
      var p = CATALOG[sku] || {};
      var img = i.image || p.image || '';
      var name = p.name || i.name || sku;
      var link = 'product.html?sku=' + encodeURIComponent(sku);
      return '<a href="' + link + '" style="display:flex;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid #f3ede1;text-decoration:none;color:inherit">' +
        (img ? '<img src="' + esc(img) + '" alt="" style="width:52px;height:64px;object-fit:cover;border-radius:6px;background:#f0ede5;flex:none">' : '<div style="width:52px;height:64px;border-radius:6px;background:#eae5d8;flex:none"></div>') +
        '<div style="flex:1;min-width:0"><div style="font-family:\'Cormorant Garamond\',serif;font-size:15px;color:#1A1A1A;line-height:1.3">' + esc(name) + '</div>' +
        '<div style="font-family:\'Montserrat\',sans-serif;font-size:11px;color:#9a9a9a;margin-top:2px">Qty ' + (i.qty || 1) + '</div></div>' +
        '</a>';
    }).join('');
  }

  function etaForOrder(o) {
    var pin = '';
    try { var a = JSON.parse(o.address || '{}'); pin = a.pin || ''; } catch(e) {}
    if (!pin) { var m = String(o.address || '').match(/\b(\d{6})\b/); pin = m ? m[1] : ''; }
    if (!pin) return '';
    var p = String(pin).replace(/\D/g, ''), lo = 5, hi = 8;
    if (/^40[01]/.test(p)) { lo = 2; hi = 4; } else if (/^4[1-4]/.test(p)) { lo = 3; hi = 5; }
    var base = o.created_at ? new Date(String(o.created_at).replace(' ', 'T') + 'Z') : new Date();
    if (isNaN(base.getTime())) base = new Date();
    var M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var f = function(d) { return d.getDate() + ' ' + M[d.getMonth()]; };
    return f(new Date(base.getTime() + lo*86400000)) + ' – ' + f(new Date(base.getTime() + hi*86400000));
  }

  function orderCard(o) {
    var statusLabel = (o.status || 'confirmed').toUpperCase();
    var hasAWB = o.awb && o.awb.trim();
    var eta = etaForOrder(o);
    return '<div class="order-card">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">' +
        '<div><div class="order-id-font">' + esc(o.id) + '</div>' +
        '<div style="font-family:\'Montserrat\',sans-serif;font-size:11px;font-weight:300;color:#9a9a9a;margin-top:3px;">Placed ' + fmtDate(o.created_at) + '</div></div>' +
        '<span style="font-family:\'Montserrat\',sans-serif;font-size:9px;font-weight:500;letter-spacing:2px;padding:5px 12px;border-radius:20px;background:' + (statusLabel === 'CONFIRMED' ? '#0B3C26' : '#C5A059') + ';color:#fff;">' + statusLabel + '</span>' +
      '</div>' +
      '<div style="margin-top:10px">' + itemsHtml(o.items) + '</div>' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid #f3ede1;">' +
        '<span style="font-family:\'Montserrat\',sans-serif;font-size:12px;color:#6a6a6a;">' + (eta ? 'Est. delivery <strong style="color:#0B3C26;font-weight:600;">' + eta + '</strong>' : '') + '</span>' +
        '<span style="font-family:\'Montserrat\',sans-serif;font-size:14px;font-weight:600;color:#0B3C26;font-variant-numeric:tabular-nums;">' + fmt(o.total) + '</span>' +
      '</div>' +
      (hasAWB ? '<div style="margin-top:10px;padding:10px 12px;background:#e8f0e8;border-radius:6px;font-family:\'Montserrat\',sans-serif;font-size:12px;"><strong style="color:#0B3C26;">AWB: ' + esc(o.awb) + '</strong> <a href="' + esc(o.awb_url || '#') + '" target="_blank" style="margin-left:12px;color:#0B3C26;border-bottom:1px solid #C5A059;text-decoration:none;">Track via Shiprocket →</a></div>' : '') +
    '</div>';
  }

  function doTrack() {
    var phone = ($('track-phone').value || '').replace(/\D/g, '');
    var oid = ($('track-oid').value || '').trim().toUpperCase();

    if (!phone || phone.length !== 10) {
      $('track-status').innerHTML = '<span style="color:#c0392b;font-family:Montserrat,sans-serif;font-size:12px;">Enter a valid 10-digit mobile number.</span>';
      return;
    }
    if (!oid || !/^CC-/.test(oid)) {
      $('track-status').innerHTML = '<span style="color:#c0392b;font-family:Montserrat,sans-serif;font-size:12px;">Enter a valid order ID (starts with CC-).</span>';
      return;
    }

    $('track-status').innerHTML = '<span style="color:#9a9a9a;font-family:Montserrat,sans-serif;font-size:12px;">Searching…</span>';
    $('track-results').innerHTML = '';
    $('track-btn').disabled = true;

    var url = '/api/orders/track?order_id=' + encodeURIComponent(oid) + '&phone=' + encodeURIComponent(phone);

    fetch(url).then(function(r) { return r.json(); }).then(function(d) {
      $('track-status').innerHTML = '';
      $('track-btn').disabled = false;
      if (!d || !d.success || !d.orders || !d.orders.length) {
        $('track-results').innerHTML = '<div style="padding:24px;text-align:center;color:#9a9a9a;font-family:Montserrat,sans-serif;font-size:13px;">No matching order found. Check your phone number and order ID.</div>';
        return;
      }
      // Verify phone matches (security — cross-check)
      var matches = d.orders.filter(function(o) {
        var oPhone = String(o.phone || '').replace(/\D/g, '').slice(-10);
        return oPhone === phone;
      });
      if (!matches.length) {
        $('track-results').innerHTML = '<div style="padding:24px;text-align:center;color:#c0392b;font-family:Montserrat,sans-serif;font-size:13px;">Phone number does not match this order. Please check and try again.</div>';
        return;
      }
      $('track-results').innerHTML = matches.map(orderCard).join('');
    }).catch(function() {
      $('track-status').innerHTML = '<span style="color:#c0392b;font-family:Montserrat,sans-serif;font-size:12px;">Network error. Please try again.</span>';
      $('track-btn').disabled = false;
    });
  }

  $('track-btn').addEventListener('click', doTrack);
  $('track-oid').addEventListener('keydown', function(e) { if (e.key === 'Enter') doTrack(); });
  $('track-phone').addEventListener('keydown', function(e) { if (e.key === 'Enter') $('track-oid').focus(); });

  function boot() {
    hydrateCatalog();
    if (!window.CHAUHAN_CATALOG || !window.CHAUHAN_CATALOG.length) {
      window.addEventListener('catalog-ready', function once() { window.removeEventListener('catalog-ready', once); hydrateCatalog(); });
    }
  }
  if (!document.querySelector('script[src^="catalog.js"]')) {
    var cs = document.createElement('script'); cs.src = 'catalog.js?v=13'; document.head.appendChild(cs);
  }
  if (document.readyState !== 'loading') boot();
  else document.addEventListener('DOMContentLoaded', boot);
})();
</script>
