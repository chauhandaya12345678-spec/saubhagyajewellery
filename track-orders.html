<style>
  .track-wrap { max-width: 640px; margin: 0 auto; }
  .track-form { display:flex; flex-direction:column; gap:20px; margin:20px 0 0; }
  .track-row { display:flex; gap:16px; flex-wrap:wrap; }
  .track-row input { flex:1; min-width:160px; height:52px; padding:0 16px; border:1px solid #ddd6c6; font-family:'Montserrat',sans-serif; font-size:14px; outline:none; background:#fff; border-radius:12px !important; }
  .track-row input:focus { border-color:#C5A880; }
  .track-btn { height:52px; padding:0 32px; background:#0B291C; color:#fff; border:none; font-family:'Montserrat',sans-serif; font-size:13px; letter-spacing:1.5px; cursor:pointer; white-space:nowrap; align-self:flex-start; border-radius:12px; box-shadow:0 2px 8px rgba(11,41,28,.15); transition:all .4s cubic-bezier(.25,1,.5,1); }
  .track-btn:disabled { opacity:.6; cursor:not-allowed; }
  .track-btn:hover:not(:disabled) { background:#071B12; transform:translateY(-2px); box-shadow:0 6px 20px rgba(11,41,28,.25); }

  .order-card { border:1px solid rgba(90,136,0,.25); border-radius:12px; padding:20px; background:#fff; margin-bottom:20px; }
  .order-id-font { font-family:'Montserrat',sans-serif; font-size:14px; font-weight:600; letter-spacing:1px; color:#0B291C; font-variant-numeric:tabular-nums; }
  .order-date { font-family:'Montserrat',sans-serif; font-size:13px; color:#9a9a9a; margin-top:3px; }
  .order-total { font-family:'Montserrat',sans-serif; font-size:15px; font-weight:600; color:#0B291C; margin-left:auto; }

  /* Progress bar - absolute connector line under dots, no overflow */
  .progress-bar { position:relative; display:flex; justify-content:space-between; margin:22px 4px 8px; padding:0 12px; }
  .progress-bar::before {
    content:''; position:absolute; top:8px; left:calc(10% + 12px); right:calc(10% + 12px);
    height:2px; background:#e0dcd0; z-index:0; border-radius:2px;
  }
  .progress-bar::after {
    content:''; position:absolute; top:8px; left:calc(10% + 12px);
    width: calc(var(--pb-done, 0) * (80% - 24px));
    height:2px; background:#0B291C; z-index:0; border-radius:2px;
    transition:width .4s cubic-bezier(.25,1,.5,1);
  }
  .progress-step { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; align-items:center; min-width:0; }
  .progress-dot { width:16px; height:16px; border-radius:50%; background:#e0dcd0; transition:background .3s, box-shadow .3s; }
  .progress-dot.done { background:#0B291C; }
  .progress-dot.current { background:#C5A880; box-shadow:0 0 0 4px rgba(90,136,0,.3); }
  .progress-label { font-family:'Montserrat',sans-serif; font-size:9px; letter-spacing:.5px; color:#9a9a9a; margin-top:8px; text-align:center; line-height:1.3; word-break:break-word; }
  .progress-label.done { color:#0B291C; font-weight:600; }

  .status-badge { display:inline-block; font-family:'Montserrat',sans-serif; font-size:9px; font-weight:500; letter-spacing:1.5px; padding:5px 14px; border-radius:20px; }
  .status-CONFIRMED, .status-PACKED { background:#C5A880; color:#fff; }
  .status-SHIPPED, .status-OUT_FOR_DELIVERY { background:#0B291C; color:#fff; }
  .status-DELIVERED { background:#27ae60; color:#fff; }
  .status-CANCELLED, .status-LOST, .status-RTO { background:#c0392b; color:#fff; }

  .track-link { display:inline-block; margin-top:12px; padding:10px 20px; background:#0B291C; color:#fff; text-decoration:none; font-family:'Montserrat',sans-serif; font-size:13px; letter-spacing:1px; border-radius:8px; }
  .track-link:hover { background:#071B12; }

  .guest-box { text-align:center; padding:30px 20px; border:1px solid #eae5d8; border-radius:12px; background:#faf8f3; }
  .guest-box h3 { font-family:'Playfair Display',serif; font-size:18px; margin:0 0 8px; }
  .guest-box p { font-family:'Montserrat',sans-serif; font-size:12px; color:#6a6a6a; margin:0 0 12px; }
  .guest-box a { color:#0B291C; text-decoration:none; border-bottom:1px solid #C5A880; }

  .eta-text { font-family:'Montserrat',sans-serif; font-size:12px; color:#6a6a6a; margin-top:8px; }
  .eta-text strong { color:#0B291C; }

  @media (max-width:600px) {
    .progress-label { font-size:8px; }
    .track-row { flex-direction:column; gap:18px; }
    .track-row input { min-width:100%; }
    .track-btn { width:100%; height:52px; margin-top:2px; }
  }
</style>
</head>
<body>
<x-layout page="track-orders.html"></x-layout>
<main>
<nav class="crumb"><a href="index.html">Home</a><i>/</i><span>Track Orders</span></nav>
<section class="ph">
  <div class="kicker">ORDER STATUS</div>
  <h1>Track Orders</h1>
  <p class="lede" id="track-lede">Loading your orders…</p>
</section>
<section class="prose">
<div class="track-wrap">

  <!-- Auto-loaded orders (signed in or URL params) -->
  <div id="track-results" style="display:flex;flex-direction:column;gap:0;"></div>

  <!-- Guest: no data -->
  <div id="track-guest" style="display:none;">
    <div class="guest-box">
      <h3>Sign in to view your orders</h3>
      <p>Your orders are linked to your account. Sign in or enter your details below to track a specific order.</p>
      <a href="account.html">Sign In →</a>
    </div>
  </div>

  <!-- Manual lookup (always available below orders) -->
  <div id="track-manual" style="display:none; margin-top:24px; padding-top:24px; border-top:1px solid #eae5d8;">
    <h3 style="font-family:'Playfair Display',serif;font-size:16px;margin:0 0 4px;">Look up another order</h3>
    <p style="font-family:'Montserrat',sans-serif;font-size:13px;color:#9a9a9a;margin:0 0 12px;">Enter your phone number and order ID.</p>
    <div class="track-form">
      <div class="track-row">
        <input id="track-phone" type="tel" inputmode="numeric" maxlength="10" placeholder="10-digit mobile number">
        <input id="track-oid" type="text" placeholder="Order ID (CC-...)" style="text-transform:uppercase;">
      </div>
      <button class="track-btn" id="track-btn">TRACK</button>
    </div>
  </div>

  <div id="track-status" style="margin-top:10px;"></div>
</div>
</section>
</main>
<x-footer></x-footer>

<script>
(function () {
  'use strict';
  var $ = function(id) { return document.getElementById(id); };
  var fmt = function (paise) { return '₹' + Number((paise || 0) / 100).toLocaleString('en-IN'); };
  var fmtDate = function(d) { if (!d) return ''; return new Date(String(d).replace(' ', 'T') + 'Z').toLocaleDateString('en-IN', { month:'short', day:'numeric', year:'numeric' }); };
  var esc = function(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); };

  // Helper: build fetch options with Bearer session token if available
  function authOpts() {
    try {
      var t = localStorage.getItem('cc_token');
      if (t) return { headers: { 'Authorization': 'Bearer ' + t } };
    } catch(e) {}
    return {};
  }

  var CATALOG = {};
  function hydrateCatalog() {
    (window.CHAUHAN_CATALOG || []).forEach(function(p) { CATALOG[p.id || p.sku] = p; });
  }

  // ── ShipPrime status mapping ──
  var SP_STEPS = ['CONFIRMED', 'PACKED', 'SHIPPED', 'OUT_FOR_DELIVERY', 'DELIVERED'];
  var SP_LABELS = {
    CONFIRMED: 'Confirmed', PACKED: 'Packed', SHIPPED: 'Shipped',
    OUT_FOR_DELIVERY: 'Out for Delivery', DELIVERED: 'Delivered',
    UNDELIVERED: 'Undelivered', RTO_INITIATED: 'Return Started', RTO: 'Returned',
    CANCELLED: 'Cancelled', LOST: 'Lost'
  };

  function getStepIndex(status) {
    return SP_STEPS.indexOf(status);
  }

  function progressBar(spStatus, fallbackStatus) {
    var status = spStatus || fallbackStatus || 'CONFIRMED';
    var idx = getStepIndex(status);
    if (idx < 0) idx = 0; // unknown → show as CONFIRMED

    var steps = [
      { key: 'CONFIRMED', emoji: '✅', label: 'Confirmed' },
      { key: 'PACKED', emoji: '📦', label: 'Packed' },
      { key: 'SHIPPED', emoji: '🚚', label: 'Shipped' },
      { key: 'OUT_FOR_DELIVERY', emoji: '📮', label: 'Out for Delivery' },
      { key: 'DELIVERED', emoji: '🏠', label: 'Delivered' }
    ];

    var doneFrac = idx / (steps.length - 1);
    var html = '<div class="progress-bar" style="--pb-done:' + doneFrac + '">';
    for (var i = 0; i < steps.length; i++) {
      var s = steps[i];
      var done = i <= idx;
      html += '<div class="progress-step">';
      html += '<div class="progress-dot' + (done ? (i === idx ? ' current' : ' done') : '') + '"></div>';
      html += '<div class="progress-label' + (done ? ' done' : '') + '">' + s.emoji + '<br>' + s.label + '</div>';
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  // ── Items HTML ──
  function itemsHtml(items) {
    items = items || [];
    return items.map(function(i) {
      var sku = i.id || i.sku || '';
      var p = CATALOG[sku] || {};
      var img = i.image || p.image || '';
      var name = p.name || i.name || sku;
      var link = 'product.html?sku=' + encodeURIComponent(sku);
      return '<a href="' + link + '" style="display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #f3ede1;text-decoration:none;color:inherit">' +
        (img ? '<img src="' + esc(img) + '" alt="" style="width:44px;height:56px;object-fit:cover;border-radius:6px;background:#f0ede5;flex:none">' : '<div style="width:44px;height:56px;border-radius:6px;background:#eae5d8;flex:none"></div>') +
        '<div style="flex:1;min-width:0"><div style="font-family:\'Playfair Display\',serif;font-size:14px;color:#1A1A1A;line-height:1.3">' + esc(name) + '</div>' +
        '<div style="font-family:\'Montserrat\',sans-serif;font-size:10px;color:#9a9a9a;margin-top:2px">Qty ' + (i.qty || 1) + '</div></div></a>';
    }).join('');
  }

  // ── ETA calculation ──
  function etaForOrder(o) {
    var pin = '';
    try { var a = JSON.parse(o.address || '{}'); pin = a.pin || ''; } catch(e) {}
    if (!pin) { var m = String(o.address || '').match(/\b(\d{6})\b/); pin = m ? m[1] : ''; }
    if (!pin) return '';
    var p = String(pin).replace(/\D/g, ''), lo = 5, hi = 8;
    if (/^40[01]/.test(p)) { lo = 2; hi = 4; }
    else if (/^4[1-4]/.test(p)) { lo = 3; hi = 5; }
    var base = o.created_at ? new Date(String(o.created_at).replace(' ', 'T') + 'Z') : new Date();
    if (isNaN(base.getTime())) base = new Date();
    var M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var f = function(d) { return d.getDate() + ' ' + M[d.getMonth()]; };
    return f(new Date(base.getTime() + lo*86400000)) + ' – ' + f(new Date(base.getTime() + hi*86400000));
  }

  // ── Render order card ──
  function orderCard(o, spData) {
    var spStatus = spData ? spData.currentStatus : null;
    var fallbackStatus = o.status || 'confirmed';
    var displayStatus = spStatus || fallbackStatus.toUpperCase();
    var statusLabel = SP_LABELS[displayStatus] || displayStatus;
    var awb = o.awb && o.awb.trim();
    var eta = etaForOrder(o);
    var trackUrl = awb ? 'https://shipprime.live/saubhagyajewellery/track/' + awb : '';
    var name = o.name || 'Customer';
    var address = '';
    try { var a = JSON.parse(o.address || '{}'); address = [a.city, a.state].filter(Boolean).join(', '); } catch(e) {}

    return '<div class="order-card">' +
      // Header
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">' +
        '<div>' +
          '<div class="order-id-font">' + esc(o.id) + '</div>' +
          '<div class="order-date">Placed ' + fmtDate(o.created_at) + (address ? ' · ' + esc(address) : '') + '</div>' +
          '<div style="font-family:\'Montserrat\',sans-serif;font-size:13px;color:#6a6a6a;margin-top:2px;">👤 ' + esc(name) + '</div>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">' +
          '<span class="status-badge status-' + displayStatus + '">' + statusLabel + '</span>' +
          '<span class="order-total">' + fmt(o.total) + '</span>' +
        '</div>' +
      '</div>' +
      // Progress bar
      progressBar(displayStatus, fallbackStatus) +
      // ETA
      (eta ? '<div class="eta-text">📅 Est. delivery: <strong>' + eta + '</strong></div>' : '') +
      // AWB & tracking
      (awb ? '<div style="margin-top:10px;"><span style="font-family:\'Montserrat\',sans-serif;font-size:13px;color:#6a6a6a;">AWB: ' + esc(awb) + '</span>' +
        '<a class="track-link" href="' + trackUrl + '" target="_blank" rel="noopener" style="margin-left:10px;">🔗 Track Live →</a></div>' : '') +
      // Items
      '<div style="margin-top:12px;">' + itemsHtml(o.items) + '</div>' +
    '</div>';
  }

  // ── Fetch ShipPrime tracking status ──
  function fetchShipPrimeStatus(awb) {
    if (!awb) return Promise.resolve(null);
    return fetch('/api/orders/shipprime-track?awb=' + encodeURIComponent(awb))
      .then(function(r) { return r.json(); })
      .then(function(d) { return d && d.success ? d : null; })
      .catch(function() { return null; });
  }

  // ── Render multiple orders ──
  function renderOrders(orders) {
    $('track-guest').style.display = 'none';
    $('track-lede').textContent = orders.length === 1 ? 'Your order' : 'Your orders (' + orders.length + ')';

    // Fetch ShipPrime status for all orders with AWB
    var spPromises = orders.map(function(o) {
      return o.awb ? fetchShipPrimeStatus(o.awb) : Promise.resolve(null);
    });

    Promise.all(spPromises).then(function(spResults) {
      $('track-results').innerHTML = orders.map(function(o, i) {
        return orderCard(o, spResults[i]);
      }).join('');
      // Show manual lookup below
      $('track-manual').style.display = 'block';
      // Pre-fill phone if available
      if (orders.length && orders[0].phone) {
        $('track-phone').value = String(orders[0].phone || '').replace(/\D/g, '').slice(-10);
      }
    });
  }

  // ── Manual track ──
  function doTrack() {
    var phone = ($('track-phone').value || '').replace(/\D/g, '');
    var oid = ($('track-oid').value || '').trim().toUpperCase();

    if (!phone || phone.length !== 10) {
      $('track-status').innerHTML = '<span style="color:#c0392b;font-family:Montserrat,sans-serif;font-size:12px;">Enter a valid 10-digit mobile number.</span>';
      return;
    }
    if (!oid || !/^CC-/.test(oid)) {
      $('track-status').innerHTML = '<span style="color:#c0392b;font-family:Montserrat,sans-serif;font-size:12px;">Enter a valid order ID (starts with CC-).</span>';
      return;
    }

    $('track-status').innerHTML = '<span style="color:#9a9a9a;font-family:Montserrat,sans-serif;font-size:12px;">Searching…</span>';
    $('track-btn').disabled = true;

    fetch('/api/orders/track?order_id=' + encodeURIComponent(oid) + '&phone=' + encodeURIComponent(phone), authOpts())
      .then(function(r) { return r.json(); })
      .then(function(d) {
        $('track-status').innerHTML = '';
        $('track-btn').disabled = false;
        if (!d || !d.success || !d.orders || !d.orders.length) {
          $('track-guest').style.display = 'none';
          $('track-results').innerHTML = '<div style="padding:24px;text-align:center;color:#9a9a9a;font-family:Montserrat,sans-serif;font-size:13px;">No matching order found. Check your phone number and order ID.</div>';
          return;
        }
        renderOrders(d.orders);
      }).catch(function() {
        $('track-status').innerHTML = '<span style="color:#c0392b;font-family:Montserrat,sans-serif;font-size:12px;">Network error. Please try again.</span>';
        $('track-btn').disabled = false;
      });
  }

  // ── Auto-detect ──
  function autoDetect() {
    var url = new URL(window.location.href);
    var urlOrderId = url.searchParams.get('order_id');
    var urlPhone = url.searchParams.get('phone');
    var urlEmail = url.searchParams.get('email');
    var urlToken = url.searchParams.get('token');

    // Priority 1: URL params
    if (urlOrderId && (urlPhone || urlEmail || urlToken)) {
      $('track-phone').value = urlPhone || '';
      $('track-oid').value = urlOrderId;
      if (urlPhone) doTrack();
      else {
        fetch('/api/orders/track?order_id=' + encodeURIComponent(urlOrderId) + (urlToken ? '&token=' + encodeURIComponent(urlToken) : '&phone=' + encodeURIComponent(urlEmail)), authOpts())
          .then(function(r) { return r.json(); })
          .then(function(d) { if (d && d.success) renderOrders(d.orders); else showGuest(); })
          .catch(showGuest);
      }
      return;
    }

    // Priority 2: localStorage user (signed in, with or without recent order)
    var user = null;
    try { user = JSON.parse(localStorage.getItem('cc_user') || 'null'); } catch(e) {}
    var lastOrderId = null;
    try { lastOrderId = localStorage.getItem('cc_lastorderid'); } catch(e) {}

    if (user && user.phone) {
      $('track-phone').value = String(user.phone || '').replace(/\D/g, '').slice(-10);
      if (lastOrderId) {
        // User just bought something — track that order directly
        $('track-oid').value = lastOrderId;
        doTrack();
        return;
      }
      // User signed in but no recent order — fetch all their orders by phone
      fetch('/api/orders/track?phone=' + encodeURIComponent(user.phone), authOpts())
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d && d.success && d.orders && d.orders.length) {
            renderOrders(d.orders);
          } else {
            showGuest();
          }
        })
        .catch(showGuest);
      return;
    }

    // Priority 3: logged-in user via MPA
    var mpaUser = null;
    try { mpaUser = window.MPA ? window.MPA.getUser() : null; } catch(e) {}
    if (mpaUser && (mpaUser.phone || mpaUser.email)) {
      var params = mpaUser.email ? 'email=' + encodeURIComponent(mpaUser.email) : '';
      if (mpaUser.phone) params += (params ? '&' : '') + 'phone=' + encodeURIComponent(mpaUser.phone);
      fetch('/api/orders/track?' + params, authOpts())
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d && d.success && d.orders && d.orders.length) {
            renderOrders(d.orders);
          } else {
            showGuest();
          }
        })
        .catch(showGuest);
      return;
    }

    // Nothing found → show guest message + manual form
    showGuest();
  }

  function showGuest() {
    $('track-guest').style.display = 'block';
    $('track-manual').style.display = 'block';
    $('track-lede').textContent = 'Sign in or enter your details to track your order.';
  }

  // ── Button handlers ──
  $('track-btn').addEventListener('click', doTrack);
  $('track-oid').addEventListener('keydown', function(e) { if (e.key === 'Enter') doTrack(); });
  $('track-phone').addEventListener('keydown', function(e) { if (e.key === 'Enter') $('track-oid').focus(); });

  // ── Init ──
  function boot() {
    hydrateCatalog();
    if (!window.CHAUHAN_CATALOG || !window.CHAUHAN_CATALOG.length) {
      window.addEventListener('catalog-ready', function once() { window.removeEventListener('catalog-ready', once); hydrateCatalog(); });
    }
    autoDetect();
  }
  if (!document.querySelector('script[src^="catalog.js"]')) {
    var cs = document.createElement('script'); cs.src = 'catalog.js?v=13'; document.head.appendChild(cs);
  }
  if (document.readyState !== 'loading') boot();
  else document.addEventListener('DOMContentLoaded', boot);
})();
</script>
</body>
</html>
